<!DOCTYPE html>

<html lang="mn">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Glow Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#fdf8f5;
  --surface:#fff;
  --card:#fff9f6;
  --rose-light:#fce8f0;
  --rose:#f4a7c3;
  --rose-deep:#e8639a;
  --rose-dark:#c04b7a;
  --plum:#7a1f4a;
  --plum-dark:#4a0d2a;
  --gold:#e8c88a;
  --gold-light:#fdf6e3;
  --text:#2d1420;
  --text-2:#6b3a52;
  --text-3:#a06880;
  --border:#f0d8e4;
  --border-2:#e8c8d8;
  --shadow:rgba(74,13,42,.08);
  --shadow-2:rgba(74,13,42,.15);
  --success:#22c55e;
  --error:#ef4444;
  --warn:#f59e0b;
}
html{scroll-behavior:smooth;}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;min-height:100vh;}
.serif{font-family:'Playfair Display',serif;}

/* Noise texture */
body::after{content:’’;position:fixed;inset:0;background-image:url(“data:image/svg+xml,%3Csvg viewBox=‘0 0 200 200’ xmlns=‘http://www.w3.org/2000/svg’%3E%3Cfilter id=‘n’%3E%3CfeTurbulence type=‘fractalNoise’ baseFrequency=‘0.85’ numOctaves=‘4’ stitchTiles=‘stitch’/%3E%3C/filter%3E%3Crect width=‘100%25’ height=‘100%25’ filter=‘url(%23n)’ opacity=‘0.025’/%3E%3C/svg%3E”);pointer-events:none;z-index:0;opacity:.5;}

input,select,textarea{font-family:‘Outfit’,sans-serif;outline:none;border:1.5px solid var(–border);border-radius:12px;padding:12px 16px;font-size:14px;background:var(–surface);width:100%;transition:all .25s;color:var(–text);}
input:focus,select:focus,textarea:focus{border-color:var(–rose-deep);box-shadow:0 0 0 3px rgba(232,99,154,.1);background:#fff;}
input::placeholder,textarea::placeholder{color:var(–text-3);}
button{cursor:pointer;font-family:‘Outfit’,sans-serif;}

@keyframes fadeUp{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
@keyframes blob{0%,100%{border-radius:60% 40% 30% 70%/60% 30% 70% 40%;}50%{border-radius:30% 60% 70% 40%/50% 60% 30% 60%;}}
@keyframes shimmer{0%{background-position:-200% center;}100%{background-position:200% center;}}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.5;}}

.f1{animation:fadeUp .55s .0s ease both;}
.f2{animation:fadeUp .55s .1s ease both;}
.f3{animation:fadeUp .55s .2s ease both;}
.f4{animation:fadeUp .55s .3s ease both;}
.f5{animation:fadeUp .55s .4s ease both;}

/* ── NAV ─────────────────────────────────────────── */
nav{position:sticky;top:0;z-index:200;height:66px;background:rgba(253,248,245,.93);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid var(–border);display:flex;align-items:center;justify-content:space-between;padding:0 clamp(16px,5vw,52px);}
.nav-logo{display:flex;align-items:center;gap:10px;background:none;border:none;cursor:pointer;}
.nav-petal{width:26px;height:26px;background:linear-gradient(135deg,var(–rose),var(–rose-dark));border-radius:60% 40% 30% 70%/60% 30% 70% 40%;animation:blob 6s ease-in-out infinite;flex-shrink:0;}
.nav-name{font-family:‘Playfair Display’,serif;font-size:19px;font-weight:400;color:var(–plum-dark);letter-spacing:-.2px;}
.nav-links{display:flex;gap:2px;align-items:center;}
.nav-btn{background:none;border:none;color:var(–text-3);border-radius:100px;padding:7px 16px;font-size:13px;font-weight:500;transition:all .2s;}
.nav-btn:hover{color:var(–text);background:rgba(232,99,154,.08);}
.nav-btn.active{background:var(–plum-dark);color:#fff;}
.nav-user-btn{display:flex;align-items:center;gap:7px;background:var(–rose-light);border:1.5px solid var(–border-2);color:var(–plum);border-radius:100px;padding:6px 14px;font-size:13px;font-weight:500;transition:all .2s;}
.nav-user-btn:hover{background:var(–rose);border-color:var(–rose-deep);}
.nav-avatar{width:22px;height:22px;border-radius:50%;background:var(–rose-deep);color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;}
.nav-admin{background:none;border:1.5px solid var(–border);color:var(–text-3);border-radius:100px;padding:6px 13px;font-size:12px;margin-left:6px;transition:all .2s;}
.nav-admin:hover{border-color:var(–rose-deep);color:var(–rose-deep);}
@media(max-width:560px){.nav-btn{padding:6px 10px;font-size:12px;}.nav-name{font-size:16px;}}

/* ── HERO ─────────────────────────────────────────── */
.hero{min-height:95vh;display:grid;place-items:center;padding:80px clamp(20px,5vw,64px) 60px;position:relative;overflow:hidden;}
.hero-mesh{position:absolute;inset:0;background:
radial-gradient(ellipse 80% 60% at 90% -10%,rgba(244,167,195,.35),transparent),
radial-gradient(ellipse 60% 80% at -20% 80%,rgba(232,99,154,.15),transparent),
radial-gradient(ellipse 50% 50% at 50% 50%,rgba(232,200,138,.1),transparent);
pointer-events:none;}
.hero-deco{position:absolute;width:420px;height:420px;border:1px solid rgba(244,167,195,.2);border-radius:50%;top:-80px;right:-80px;pointer-events:none;}
.hero-deco2{position:absolute;width:260px;height:260px;border:1px solid rgba(232,99,154,.12);border-radius:50%;top:-20px;right:-20px;pointer-events:none;}
.hero-inner{text-align:center;max-width:680px;position:relative;z-index:1;}
.hero-tag{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.8);border:1px solid var(–border-2);border-radius:100px;padding:7px 20px;font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(–rose-dark);margin-bottom:32px;backdrop-filter:blur(8px);}
.hero-tag-dot{width:5px;height:5px;border-radius:50%;background:var(–rose-dark);animation:pulse 2s ease-in-out infinite;}
.hero-title{font-family:‘Playfair Display’,serif;font-size:clamp(48px,9vw,96px);font-weight:300;line-height:1.0;color:var(–plum-dark);margin-bottom:22px;letter-spacing:-2px;}
.hero-title em{font-style:italic;background:linear-gradient(135deg,var(–rose-deep),var(–rose-dark));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.hero-sub{font-size:15px;color:var(–text-2);line-height:1.9;max-width:420px;margin:0 auto 44px;font-weight:300;}
.hero-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
.hero-cta{display:inline-flex;align-items:center;gap:10px;background:var(–plum-dark);color:#fff;border:none;border-radius:100px;padding:16px 36px;font-size:14px;font-weight:600;letter-spacing:.3px;box-shadow:0 14px 40px rgba(74,13,42,.25),0 2px 0 rgba(255,255,255,.1) inset;transition:all .25s;}
.hero-cta:hover{transform:translateY(-2px);box-shadow:0 20px 50px rgba(74,13,42,.3);}
.hero-cta-sec{display:inline-flex;align-items:center;gap:10px;background:rgba(255,255,255,.8);color:var(–plum);border:1.5px solid var(–border-2);border-radius:100px;padding:15px 32px;font-size:14px;font-weight:500;backdrop-filter:blur(8px);transition:all .25s;}
.hero-cta-sec:hover{background:#fff;border-color:var(–rose-deep);transform:translateY(-2px);}
.hero-stats{display:flex;gap:32px;justify-content:center;margin-top:52px;padding-top:40px;border-top:1px solid var(–border);}
.hero-stat{text-align:center;}
.hero-stat-num{font-family:‘Playfair Display’,serif;font-size:28px;font-weight:400;color:var(–plum-dark);}
.hero-stat-lbl{font-size:11px;color:var(–text-3);font-weight:500;letter-spacing:.5px;margin-top:2px;}
@media(max-width:480px){.hero-stats{gap:20px;}.hero-stat-num{font-size:22px;}}

/* ── SECTION ─────────────────────────────────────── */
.section{padding:88px clamp(20px,5vw,64px);position:relative;}
.section-alt{background:var(–surface);}
.sec-eyebrow{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.sec-line{width:28px;height:1.5px;background:linear-gradient(to right,var(–rose-deep),var(–rose));}
.sec-eye-txt{font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(–rose-deep);}
.sec-title{font-family:‘Playfair Display’,serif;font-size:clamp(28px,4.5vw,48px);font-weight:300;line-height:1.1;color:var(–plum-dark);letter-spacing:-1px;}
.sec-title em{font-style:italic;color:var(–rose-deep);}
.sec-sub{font-size:14px;color:var(–text-2);line-height:1.8;margin-top:10px;max-width:480px;font-weight:300;}

/* ── SERVICE CARDS ───────────────────────────────── */
.svc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(268px,1fr));gap:20px;max-width:1100px;margin:44px auto 0;}
.svc-card{background:var(–surface);border-radius:24px;overflow:hidden;border:1px solid var(–border);transition:all .35s;cursor:pointer;position:relative;group:true;}
.svc-card:hover{transform:translateY(-5px);box-shadow:0 20px 60px var(–shadow-2);border-color:var(–border-2);}
.svc-img{width:100%;height:180px;object-fit:cover;display:block;transition:transform .5s ease;}
.svc-card:hover .svc-img{transform:scale(1.04);}
.svc-img-wrap{overflow:hidden;position:relative;}
.svc-img-ph{width:100%;height:140px;display:flex;align-items:center;justify-content:center;font-size:48px;background:linear-gradient(135deg,rgba(244,167,195,.2),rgba(232,200,138,.15));}
.svc-badge{position:absolute;top:12px;right:12px;background:rgba(255,255,255,.9);backdrop-filter:blur(8px);border-radius:100px;padding:4px 12px;font-size:11px;font-weight:600;color:var(–rose-dark);}
.svc-body{padding:20px 22px 22px;}
.svc-name{font-family:‘Playfair Display’,serif;font-size:19px;font-weight:400;color:var(–plum-dark);margin-bottom:5px;letter-spacing:-.2px;}
.svc-desc{font-size:12px;color:var(–text-3);line-height:1.65;margin-bottom:14px;font-weight:300;}
.svc-subs{display:flex;flex-direction:column;gap:4px;margin-bottom:16px;}
.svc-sub-row{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;background:var(–rose-light);border-radius:10px;}
.svc-sub-name{font-size:12px;color:var(–text-2);font-weight:500;}
.svc-sub-price{font-size:12px;font-weight:700;color:var(–rose-dark);}
.svc-book-link{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:var(–plum);background:none;border:none;padding:0;transition:gap .2s;text-transform:uppercase;letter-spacing:.5px;}
.svc-book-link:hover{gap:10px;color:var(–rose-deep);}

/* ── GALLERY ─────────────────────────────────────── */
.gal-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;max-width:1100px;margin:44px auto 0;}
.gal-item{border-radius:20px;overflow:hidden;aspect-ratio:1;position:relative;background:var(–border);cursor:pointer;}
.gal-item img{width:100%;height:100%;object-fit:cover;transition:transform .5s ease;}
.gal-item:hover img{transform:scale(1.08);}
.gal-ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(74,13,42,.55),transparent);opacity:0;transition:opacity .3s;display:flex;align-items:flex-end;padding:14px;}
.gal-item:hover .gal-ov{opacity:1;}
.gal-caption{color:#fff;font-size:12px;font-weight:500;}

/* ── ABOUT ───────────────────────────────────────── */
.about-wrap{max-width:980px;margin:44px auto 0;display:grid;grid-template-columns:1fr 1.1fr;gap:72px;align-items:center;}
@media(max-width:700px){.about-wrap{grid-template-columns:1fr;gap:36px;}}
.about-img-frame{border-radius:32px;overflow:hidden;aspect-ratio:3/4;background:linear-gradient(135deg,var(–rose-light),rgba(232,200,138,.15));display:flex;align-items:center;justify-content:center;font-size:80px;position:relative;}
.about-img-frame img{width:100%;height:100%;object-fit:cover;}
.about-badge{position:absolute;bottom:-14px;right:-14px;background:var(–plum-dark);border-radius:18px;padding:14px 20px;box-shadow:0 12px 40px rgba(74,13,42,.3);}
.about-badge p{font-size:9px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:2px;margin-bottom:2px;}
.about-badge strong{font-family:‘Playfair Display’,serif;font-size:22px;font-weight:300;color:#fff;}
.about-body{font-size:14px;color:var(–text-2);line-height:2;margin-bottom:28px;font-weight:300;}
.about-cta{display:inline-flex;align-items:center;gap:10px;background:var(–plum-dark);color:#fff;border:none;border-radius:100px;padding:14px 30px;font-size:14px;font-weight:500;transition:all .2s;box-shadow:0 8px 28px var(–shadow-2);}
.about-cta:hover{background:var(–plum);transform:translateY(-2px);}

/* ── INFO ────────────────────────────────────────── */
.info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px;max-width:860px;margin:0 auto;}
.info-card{background:var(–surface);border:1px solid var(–border);border-radius:20px;padding:24px 22px;transition:transform .25s;text-align:center;}
.info-card:hover{transform:translateY(-3px);box-shadow:0 8px 32px var(–shadow);}
.info-icon{font-size:26px;margin-bottom:12px;}
.info-label{font-size:9px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(–rose-deep);margin-bottom:6px;}
.info-val{font-size:13px;color:var(–text-2);line-height:1.65;}

/* ── FOOTER ──────────────────────────────────────── */
footer{background:var(–plum-dark);padding:56px clamp(20px,5vw,64px) 32px;}
.foot-inner{max-width:960px;margin:0 auto;}
.foot-top{display:flex;justify-content:space-between;flex-wrap:wrap;gap:40px;padding-bottom:40px;border-bottom:1px solid rgba(255,255,255,.07);margin-bottom:24px;}
.foot-brand-name{font-family:‘Playfair Display’,serif;font-size:26px;font-weight:300;color:#fff;margin-bottom:8px;}
.foot-brand-sub{font-size:12px;color:rgba(255,255,255,.3);line-height:1.9;}
.foot-links-title{font-size:9px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:rgba(255,255,255,.2);margin-bottom:14px;}
.foot-links a{display:flex;align-items:center;gap:8px;color:rgba(255,255,255,.35);text-decoration:none;font-size:13px;margin-bottom:10px;transition:color .2s;}
.foot-links a:hover{color:rgba(255,255,255,.75);}
.foot-copy{font-size:11px;color:rgba(255,255,255,.18);text-align:center;}

/* ── BOOK PAGE ───────────────────────────────────── */
.book-wrap{max-width:580px;margin:0 auto;padding:48px clamp(20px,4vw,40px) 80px;}
.stepper{display:flex;align-items:center;margin-bottom:48px;gap:0;}
.step-node{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;transition:all .3s;}
.step-done{background:var(–plum-dark);color:#fff;}
.step-active{background:var(–rose-deep);color:#fff;box-shadow:0 4px 14px rgba(232,99,154,.4);}
.step-idle{background:var(–border);color:var(–text-3);}
.step-lbl{font-size:11px;font-weight:500;white-space:nowrap;margin-left:6px;}
.step-lbl.on{color:var(–plum-dark);}
.step-lbl.off{color:var(–text-3);}
.step-line{flex:1;height:1.5px;margin:0 6px;transition:background .3s;}
.step-line-done{background:var(–plum-dark);}
.step-line-idle{background:var(–border);}

.slot-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:22px;}
.slot-btn{border-radius:14px;padding:13px 6px;border:1.5px solid var(–border);background:var(–card);transition:all .2s;text-align:center;cursor:pointer;}
.slot-btn:hover:not(:disabled){border-color:var(–rose-deep);background:var(–surface);transform:translateY(-1px);}
.slot-btn.sel{border-color:var(–rose-deep);background:var(–plum-dark);color:#fff;box-shadow:0 6px 20px rgba(74,13,42,.2);}
.slot-btn.full{border-color:var(–border);background:var(–card);color:var(–border);cursor:not-allowed;opacity:.5;}
.slot-btn.partial{border-color:rgba(245,158,11,.3);background:rgba(253,246,227,.5);}

.sum-box{background:linear-gradient(135deg,rgba(244,167,195,.1),rgba(232,200,138,.08));border:1px solid var(–border-2);border-radius:18px;padding:20px;margin-bottom:22px;}
.sum-row{display:flex;justify-content:space-between;font-size:13px;margin-bottom:7px;}
.sum-label{color:var(–text-3);font-weight:400;}
.sum-val{font-weight:600;color:var(–plum-dark);}

.btn-primary{width:100%;background:var(–plum-dark);color:#fff;border:none;border-radius:100px;padding:15px 0;font-size:14px;font-weight:600;letter-spacing:.3px;transition:all .2s;box-shadow:0 6px 24px var(–shadow-2);}
.btn-primary:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 10px 32px var(–shadow-2);}
.btn-primary:disabled{background:#c8b4be;cursor:not-allowed;box-shadow:none;}
.btn-secondary{width:100%;background:transparent;color:var(–text-3);border:1.5px solid var(–border);border-radius:100px;padding:13px 0;font-size:13px;font-weight:500;transition:all .2s;}
.btn-secondary:hover{border-color:var(–rose-deep);color:var(–rose-deep);}
.btn-danger{background:rgba(239,68,68,.08);color:#ef4444;border:1px solid rgba(239,68,68,.2);border-radius:100px;padding:5px 12px;font-size:11px;font-weight:600;transition:all .2s;}
.btn-danger:hover{background:rgba(239,68,68,.15);}
.btn-back{background:none;border:none;color:var(–text-3);font-size:13px;display:flex;align-items:center;gap:5px;margin-bottom:22px;cursor:pointer;transition:color .2s;font-weight:500;}
.btn-back:hover{color:var(–text);}
.tag-pill{display:inline-flex;align-items:center;background:var(–rose-light);border:1px solid var(–border-2);border-radius:100px;padding:3px 13px;font-size:12px;font-weight:600;color:var(–rose-dark);}
.lbl{display:block;font-size:10px;font-weight:700;color:var(–text-3);text-transform:uppercase;letter-spacing:1px;margin-bottom:7px;}

/* ── MODAL ───────────────────────────────────────── */
.modal-overlay{position:fixed;inset:0;background:rgba(74,13,42,.5);backdrop-filter:blur(8px);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px;animation:fadeIn .2s ease;}
.modal{background:var(–surface);border-radius:24px;padding:28px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:0 40px 100px rgba(74,13,42,.25);border:1px solid var(–border);animation:fadeUp .3s ease;}
.modal-title{font-family:‘Playfair Display’,serif;font-size:20px;font-weight:400;color:var(–plum-dark);}

/* ── AUTH FORMS ──────────────────────────────────── */
.auth-wrap{min-height:100vh;background:linear-gradient(150deg,var(–plum-dark) 0%,#6a1040 100%);display:flex;align-items:center;justify-content:center;padding:24px;position:relative;overflow:hidden;}
.auth-bg-circle{position:absolute;border-radius:50%;pointer-events:none;}
.auth-card{background:var(–surface);border-radius:28px;padding:44px 38px;width:100%;max-width:400px;box-shadow:0 48px 100px rgba(0,0,0,.35);position:relative;z-index:1;border:1px solid var(–border);}
.auth-logo{text-align:center;margin-bottom:32px;}
.auth-tab-wrap{display:flex;background:var(–bg);border-radius:12px;padding:3px;margin-bottom:24px;}
.auth-tab{flex:1;padding:9px 0;border:none;border-radius:10px;font-size:13px;font-weight:600;transition:all .2s;background:transparent;color:var(–text-3);}
.auth-tab.on{background:var(–surface);color:var(–plum-dark);box-shadow:0 2px 8px var(–shadow);}

/* ── PROFILE / HISTORY ───────────────────────────── */
.profile-wrap{max-width:860px;margin:0 auto;padding:48px clamp(20px,4vw,40px) 80px;}
.profile-header{background:linear-gradient(135deg,var(–plum-dark),var(–rose-dark));border-radius:24px;padding:32px;margin-bottom:28px;position:relative;overflow:hidden;}
.profile-header::before{content:’’;position:absolute;width:200px;height:200px;border-radius:50%;border:1px solid rgba(255,255,255,.1);right:-40px;top:-40px;}
.profile-header::after{content:’’;position:absolute;width:140px;height:140px;border-radius:50%;border:1px solid rgba(255,255,255,.08);right:20px;top:20px;}
.profile-avatar{width:64px;height:64px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;color:#fff;margin-bottom:14px;border:2px solid rgba(255,255,255,.3);}
.profile-name{font-family:‘Playfair Display’,serif;font-size:24px;font-weight:400;color:#fff;margin-bottom:3px;}
.profile-phone{font-size:13px;color:rgba(255,255,255,.55);}
.profile-stats{display:flex;gap:20px;margin-top:20px;flex-wrap:wrap;}
.profile-stat{background:rgba(255,255,255,.12);border-radius:12px;padding:10px 16px;backdrop-filter:blur(8px);}
.profile-stat-num{font-size:20px;font-weight:700;color:#fff;}

function el(tag,attrs,children){
  const e=document.createElement(tag);
  if(attrs)Object.keys(attrs).forEach(k=>{if(k==="style"&&typeof attrs[k]==="object")Object.assign(e.style,attrs[k]);else if(k==="className")e.className=attrs[k];else if(k==="html")e.innerHTML=attrs[k];else if(k.startsWith("on"))e.addEventListener(k.slice(2).toLowerCase(),attrs[k]);else e.setAttribute(k,attrs[k]);});

  return e;
}

  else{svcs.forEach(svc=>{const cap=svc.capacity||1;const secDiv=div({style:{marginBottom:"16px"}});secDiv.appendChild(p({style:{fontFamily:"'Playfair Display',serif",fontWeight:"400",fontSize:"14px",marginBottom:"7px",color:"var(--plum-dark)"}},[svc.emoji||"","  ",svc.name,span({style:{fontSize:"10px",color:"var(--text-3)",fontWeight:"400",marginLeft:"5px"}},"("+cap+" зэрэг)")]));const sg=div({style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(78px,1fr))",gap:"5px"}});slots.forEach(t=>{const svcSubs=svc.subs||[];const maxDur=svcSubs.length>0?Math.max(...svcSubs.map(s=>s.duration||90)):90;const info=getSlotInfo(S.schedDate,t,svc.id,maxDur,S.bookings);const sc2=div({style:{border:"1px solid var(--border)",borderRadius:"10px",padding:"7px 5px",background:info.full?"rgba(239,68,68,.04)":info.used>0?"rgba(245,158,11,.04)":"var(--surface)",textAlign:"center"}});sc2.appendChild(p({style:{fontWeight:"700",fontSize:"12px",marginBottom:"2px"}},t));sc2.appendChild(p({style:{fontSize:"9px",fontWeight:"700",color:info.full?"#ef4444":info.used>0?"#d97706":"#16a34a"}},info.full?"Дүүрсэн":info.used+"/"+cap));const bks=S.bookings.filter(b=>b.date===S.schedDate&&b.time===t&&b.serviceId===svc.id&&b.status!=="cancelled");bks.forEach(b=>sc2.appendChild(p({style:{fontSize:"9px",color:"var(--text-3)",marginTop:"1px"}},"•"+b.name)));sg.appendChild(sc2);});secDiv.appendChild(sg);sCard.appendChild(secDiv);});}
  g.appendChild(sCard);wrap.appendChild(g);return wrap;
}

function AdminPage(){
  if(!S.adminAuthed)return AdminLoginPage();
  const cfg=S.settings;
  const wrap=div({style:{minHeight:"100vh",background:"var(--card)"}});
  const bar=div({className:"admin-bar"});
  const left=div({style:{display:"flex",alignItems:"center",gap:"9px"}});
  left.appendChild(div({className:"nav-petal",style:{width:"20px",height:"20px"}}));
  left.appendChild(span({style:{fontFamily:"'Playfair Display',serif",fontSize:"16px",fontWeight:"300",color:"#fff"}},cfg.studioName||"Glow Studio"));
  left.appendChild(span({style:{fontSize:"10px",background:"rgba(255,255,255,.07)",borderRadius:"100px",padding:"2px 9px",color:"rgba(255,255,255,.35)"}},auth.currentUser?.email||""));
  const right=div({style:{display:"flex",gap:"2px",alignItems:"center",flexWrap:"wrap"}});
  [["bookings","📋 Захиалга"],["services","✂️ Үйлчилгээ"],["gallery","🖼️ Галерей"],["feedbacks","⭐ Сэтгэгдэл"],["settings","⚙️ Тохиргоо"],["calendar","📅 Хуваарь"]].forEach(item=>{
    const tb=btn({className:"atab"+(S.adminTab===item[0]?" on":"")},item[1]);tb.addEventListener("click",()=>setState({adminTab:item[0]}));right.appendChild(tb);
  });
  const out=btn({style:{background:"none",border:"1px solid rgba(255,255,255,.1)",color:"rgba(255,255,255,.3)",borderRadius:"100px",padding:"5px 12px",fontSize:"11px",marginLeft:"6px"}},"Гарах");out.addEventListener("click",async()=>{await signOut(auth);setState({adminAuthed:false});});right.appendChild(out);
  bar.appendChild(left);bar.appendChild(right);wrap.appendChild(bar);
  const inner=div({style:{maxWidth:"1080px",margin:"0 auto",padding:"22px clamp(12px,3vw,22px)"}});
  if(S.adminTab==="bookings"){const sw=div({id:"asc"});sw.appendChild(buildStats());inner.appendChild(sw);const tw=div({id:"atc"});tw.appendChild(buildBookingTable());inner.appendChild(tw);}
  else if(S.adminTab==="services")inner.appendChild(buildServicesTab());
  else if(S.adminTab==="gallery")inner.appendChild(buildGalleryTab());
  else if(S.adminTab==="feedbacks")inner.appendChild(buildFeedbacksTab());
  else if(S.adminTab==="settings"){inner.appendChild(h2({className:"serif",style:{fontSize:"22px",fontWeight:"300",marginBottom:"4px",color:"var(--plum-dark)"}},"Тохиргоо"));inner.appendChild(p({style:{color:"var(--text-3)",fontSize:"12px",marginBottom:"18px"}},"Студийн бүх мэдээллийг энд удирдана уу"));inner.appendChild(buildSettingsTab());}
  else if(S.adminTab==="calendar")inner.appendChild(buildCalendarTab());
  wrap.appendChild(inner);return wrap;
}

/* ── RENDER ── */
function render(){
  const appEl=document.getElementById("app");appEl.innerHTML="";
  let page;
  if(S.page==="home")page=HomePage();
  else if(S.page==="book")page=BookPage();
  else if(S.page==="success")page=SuccessPage();
  else if(S.page==="admin")page=AdminPage();
  else if(S.page==="auth")page=AuthPage();
  else if(S.page==="profile")page=ProfilePage();
  else page=HomePage();
  appEl.appendChild(page);
  window.scrollTo(0,0);
}

/* ── INIT ── */
async function init(){
  const[bookings,holidays,settings,services,gallery,feedbacks]=await Promise.all([
    DB.loadBookings(),DB.loadHolidays(),DB.loadSettings(),DB.loadServices(),DB.loadGallery(),DB.loadFeedbacks()
  ]);
  S.bookings=bookings;S.holidays=holidays;S.settings=settings;S.services=services;S.gallery=gallery;S.feedbacks=feedbacks;
  document.getElementById("loading-screen").style.display="none";
  document.getElementById("app").style.display="block";
  onAuthStateChanged(auth,async user=>{
    S.user=user;
    if(user){
      S.userProfile=await DB.loadUserProfile(user.uid);
      // Check if admin
      const adminEmail=S.settings.adminEmail||"admin@glowstudio.mn";
      S.adminAuthed=(user.email===adminEmail)||(user.email?.includes("admin"));
    } else {
      S.userProfile=null;S.adminAuthed=false;
    }
    render();
  });
  startSync();render();
}
init();
</script>
