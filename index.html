<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400;1,500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --pink:#e8a0bf;--pink2:#d4729f;--pink3:#b5507d;
  --dark:#1c1218;--cream:#fdf8f5;--card:#fff;
  --border:#f0e4ec;--text:#2d1f27;--muted:#9e8490;
}
body{font-family:'Outfit',sans-serif;background:var(--cream);color:var(--text);}
.serif{font-family:'Playfair Display',serif;}
input,select,textarea{font-family:'Outfit',sans-serif;outline:none;border:1.5px solid var(--border);border-radius:12px;padding:12px 16px;font-size:14px;background:#fff;width:100%;transition:border-color .2s,box-shadow .2s;}
input:focus,select:focus,textarea:focus{border-color:var(--pink2);box-shadow:0 0 0 3px rgba(212,114,159,.12);}
button{cursor:pointer;font-family:'Outfit',sans-serif;}
@keyframes fadeUp{from{opacity:0;transform:translateY(22px);}to{opacity:1;transform:translateY(0);}}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes shimmer{0%{background-position:-200% 0;}100%{background-position:200% 0;}}
.f1{animation:fadeUp .55s ease both;}
.f2{animation:fadeUp .55s .08s ease both;}
.f3{animation:fadeUp .55s .16s ease both;}
.f4{animation:fadeUp .55s .24s ease both;}
.f5{animation:fadeUp .55s .32s ease both;}

/* NAV */
nav{position:sticky;top:0;z-index:200;height:64px;background:rgba(253,248,245,.96);backdrop-filter:blur(16px);border-bottom:1px solid var(–border);display:flex;align-items:center;justify-content:space-between;padding:0 clamp(16px,5vw,52px);}
.nav-logo{display:flex;align-items:center;gap:10px;background:none;border:none;}
.nav-logo .dot{width:10px;height:10px;border-radius:50%;background:linear-gradient(135deg,var(–pink),var(–pink3));}

/* HERO */
.hero{min-height:92vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:64px 24px;position:relative;overflow:hidden;background:var(–cream);}
.hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(232,160,191,.18) 0%,transparent 70%),radial-gradient(ellipse 50% 40% at 80% 80%,rgba(181,80,125,.08) 0%,transparent 60%);pointer-events:none;}
.hero-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.8);border:1px solid var(–border);border-radius:100px;padding:7px 22px;font-size:11px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:var(–pink3);margin-bottom:32px;}
.hero-title{font-size:clamp(44px,9vw,96px);font-weight:400;line-height:1.05;color:var(–dark);margin-bottom:22px;}
.hero-title em{font-style:italic;color:var(–pink3);}
.hero-sub{font-size:16px;color:var(–muted);max-width:480px;line-height:1.85;margin-bottom:52px;}
.hero-btn{background:var(–dark);color:#fff;border:none;border-radius:14px;padding:16px 44px;font-size:15px;font-weight:600;box-shadow:0 8px 28px rgba(28,18,24,.18);transition:transform .2s,box-shadow .2s;}
.hero-btn:hover{transform:translateY(-2px);box-shadow:0 12px 36px rgba(28,18,24,.22);}

/* SERVICES SECTION */
.section{padding:88px clamp(16px,5vw,64px);}
.section-label{font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(–pink2);margin-bottom:10px;}
.section-title{font-size:clamp(32px,5vw,48px);font-weight:400;line-height:1.15;margin-bottom:48px;}
.services-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px;max-width:1100px;margin:0 auto;}
.service-card{background:#fff;border-radius:22px;overflow:hidden;border:1.5px solid var(–border);transition:transform .25s,box-shadow .25s;cursor:pointer;}
.service-card:hover{transform:translateY(-4px);box-shadow:0 16px 48px rgba(28,18,24,.09);}
.service-card.selected{border-color:var(–pink2);box-shadow:0 0 0 3px rgba(212,114,159,.18);}
.service-img{width:100%;height:180px;object-fit:cover;display:block;background:linear-gradient(135deg,var(–border),#f9eef5);}
.service-img-placeholder{width:100%;height:180px;display:flex;align-items:center;justify-content:center;font-size:48px;background:linear-gradient(135deg,#fdf0f7,#f5e8f2);}
.service-body{padding:20px;}
.service-name{font-size:16px;font-weight:600;margin-bottom:4px;}
.service-desc{font-size:13px;color:var(–muted);line-height:1.6;margin-bottom:14px;}
.service-footer{display:flex;align-items:center;justify-content:space-between;}
.service-price{font-size:18px;font-weight:700;color:var(–pink3);}
.service-duration{font-size:12px;color:var(–muted);background:#f7f0f5;padding:3px 10px;border-radius:100px;}

/* GALLERY */
.gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;max-width:1100px;margin:0 auto;}
.gallery-item{border-radius:18px;overflow:hidden;aspect-ratio:1;position:relative;background:var(–border);cursor:pointer;}
.gallery-item img{width:100%;height:100%;object-fit:cover;transition:transform .4s ease;}
.gallery-item:hover img{transform:scale(1.06);}
.gallery-item .goverlay{position:absolute;inset:0;background:rgba(28,18,24,.38);opacity:0;transition:opacity .3s;display:flex;align-items:center;justify-content:center;padding:16px;}
.gallery-item:hover .goverlay{opacity:1;}

/* ABOUT */
.about-section{background:#fff;padding:88px clamp(16px,5vw,64px);}
.about-inner{max-width:820px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center;}
@media(max-width:640px){.about-inner{grid-template-columns:1fr;gap:32px;}}
.about-img{border-radius:24px;overflow:hidden;aspect-ratio:4/5;}
.about-img img{width:100%;height:100%;object-fit:cover;}
.about-img-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:64px;background:linear-gradient(135deg,#fdf0f7,#f5e8f2);}

/* FOOTER */
footer{background:var(–dark);color:#9e8490;padding:56px clamp(16px,5vw,64px) 36px;}
.footer-inner{max-width:1000px;margin:0 auto;}
.footer-top{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:36px;padding-bottom:36px;border-bottom:1px solid #2d1f27;margin-bottom:28px;}
.footer-brand p{font-family:‘Playfair Display’,serif;font-size:26px;color:#fff;margin-bottom:8px;}
.footer-links a{display:block;color:#9e8490;text-decoration:none;font-size:14px;margin-bottom:8px;transition:color .2s;}
.footer-links a:hover{color:#e8a0bf;}

/* BOOK PAGE */
.book-wrap{max-width:620px;margin:0 auto;padding:52px clamp(16px,4vw,32px);}
.stepper{display:flex;align-items:center;margin-bottom:48px;}
.step-dot{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}
.step-line{flex:1;height:1px;margin:0 10px;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(28,18,24,.6);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px;}

/* LOADING */
#loading-screen{position:fixed;inset:0;background:var(–cream);z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
.spinner{width:38px;height:38px;border:3px solid var(–border);border-top-color:var(–pink2);border-radius:50%;animation:spin .7s linear infinite;}

/* ADMIN */
.admin-bar{background:var(–dark);display:flex;align-items:center;justify-content:space-between;padding:0 clamp(16px,4vw,40px);height:60px;flex-wrap:wrap;gap:8px;}
.admin-tab{background:none;border:none;color:#9e8490;border-radius:8px;padding:7px 15px;font-size:13px;font-weight:500;transition:background .15s,color .15s;}
.admin-tab.active{background:rgba(255,255,255,.14);color:#fff;}
.card-box{background:#fff;border-radius:20px;padding:28px;box-shadow:0 1px 10px rgba(0,0,0,.05);}
.upload-area{border:2px dashed var(–border);border-radius:14px;padding:32px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;}
.upload-area:hover,.upload-area.drag{border-color:var(–pink2);background:#fdf4ff;}
.upload-area input[type=file]{display:none;}

/* TOAST */
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:var(–dark);color:#fff;padding:13px 26px;border-radius:100px;font-size:13px;font-weight:500;z-index:99999;transition:transform .3s ease;pointer-events:none;white-space:nowrap;}
#toast.show{transform:translateX(-50%) translateY(0);}

/* SLOT GRID */
.slot-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:28px;}
.slot-btn{border-radius:13px;padding:13px 8px;border:2px solid var(–border);background:#fff;transition:all .15s;}
.slot-btn.sel{border-color:var(–dark);background:var(–dark);color:#fff;}
.slot-btn.full{border-color:#f0e6de;background:#fafafa;color:#ccc;cursor:not-allowed;}

/* MISC */
.tag{display:inline-flex;align-items:center;gap:6px;background:#f7f0f5;border:1px solid var(–border);border-radius:100px;padding:4px 12px;font-size:12px;color:var(–pink3);}
.pill{border-radius:100px;padding:3px 12px;font-size:11px;font-weight:700;}
.divider{height:1px;background:var(–border);margin:20px 0;}
</style>

</head>

// ── DB ────────────────────────────────────────────
const DB = {
  async loadBookings(){
    try{ const s=await getDocs(collection(db,"bookings")); return s.docs.map(d=>({...d.data(),_docId:d.id})).sort((a,b)=>(b.createdAt||"").localeCompare(a.createdAt||"")); }catch(e){ return []; }

// ── Image → base64 (compress to <800KB) ──────────
function compressImage(file, maxW=900, quality=0.78){
  return new Promise((resolve,reject)=>{
    const img=new Image();
    const url=URL.createObjectURL(file);
    img.onload=()=>{
      let w=img.width, h=img.height;
      if(w>maxW){ h=Math.round(h*maxW/w); w=maxW; }
      const canvas=document.createElement("canvas");
      canvas.width=w; canvas.height=h;
      canvas.getContext("2d").drawImage(img,0,0,w,h);
      URL.revokeObjectURL(url);
      resolve(canvas.toDataURL("image/jpeg", quality));
    };
    img.onerror=reject;
    img.src=url;
  });
}

// ── Realtime ──────────────────────────────────────
function startSync(){
  onSnapshot(collection(db,"bookings"),snap=>{ S.bookings=snap.docs.map(d=>({...d.data(),_docId:d.id})).sort((a,b)=>(b.createdAt||"").localeCompare(a.createdAt||"")); if(S.page==="admin"&&S.adminAuthed) refreshAdminTable(); else render(); },e=>console.error(e));

// ── DOM helpers ───────────────────────────────────
function el(tag,attrs,children){
  const e=document.createElement(tag);
  if(attrs) Object.keys(attrs).forEach(k=>{
    if(k==="style"&&typeof attrs[k]==="object") Object.assign(e.style,attrs[k]);
    else if(k==="className") e.className=attrs[k];
    else if(k==="html") e.innerHTML=attrs[k];
    else if(k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(),attrs[k]);
    else e.setAttribute(k,attrs[k]);
  });
  if(children){ if(!Array.isArray(children))children=[children]; children.forEach(c=>{ if(c==null)return; c instanceof Node?e.appendChild(c):e.appendChild(document.createTextNode(String(c))); }); }
  return e;
}
const div=(a,c)=>el("div",a,c);

const h2=(a,c)=>el("h2",a,c);
const h3=(a,c)=>el("h3",a,c);
const lbl=(a,c)=>el("label",a,c);

}

function BookPage(){
  const cfg=S.settings;
  const wrap=div({});
  wrap.appendChild(Nav("book"));
  const inner=div({className:"book-wrap"});

  // Stepper
  const stpr=div({className:"stepper"});
  ["Үйлчилгээ","Цаг","Мэдээлэл"].forEach((s,i)=>{

  const isHol=S.holidays.indexOf(S.date)>=0;

      if(svc.imageUrl){ card.appendChild(el("img",{src:svc.imageUrl,alt:svc.name,style:{width:"80px",height:"80px",objectFit:"cover",flexShrink:"0"}})); }
      else { card.appendChild(div({style:{width:"80px",height:"80px",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"30px",background:"linear-gradient(135deg,#fdf0f7,#f5e8f2)",flexShrink:"0"}},svc.emoji||"💄")); }

      sf.appendChild(span({style:{fontSize:"11px",color:"var(--muted)",background:"#f7f0f5",padding:"2px 8px",borderRadius:"100px"}},svc.duration||""));
      bd.appendChild(sf);
      card.appendChild(bd);
      if(sel) card.appendChild(span({style:{paddingRight:"16px",fontSize:"20px",color:"var(--pink2)"}},"\u2713"));

      sg.appendChild(card);
    });
    inner.appendChild(sg);
    inner.appendChild(div({style:{marginTop:"24px"}},[
      btn({style:{width:"100%",background:S.selectedService?"var(--dark)":"#e5e7eb",color:S.selectedService?"#fff":"#9ca3af",border:"none",borderRadius:"13px",padding:"15px 0",fontSize:"15px",fontWeight:"600"},onClick:()=>{ if(S.selectedService) setState({step:2}); }}, "Үргэлжлүүлэх →")
    ]));

    inner.appendChild(di);

      inner.appendChild(div({style:{background:"#fef3c7",border:"1px solid #fcd34d",borderRadius:"12px",padding:"14px 18px",fontSize:"13px",color:"#92400e"}},"⚠️ Энэ өдөр амралтын өдөр тул захиалга авахгүй."));

        tb.appendChild(p({style:{fontWeight:"700",fontSize:"15px"}},t));

        tb.addEventListener("click",()=>{ S.time=t; render(); });
        tg.appendChild(tb);
      });
      inner.appendChild(tg);
      inner.appendChild(btn({style:{width:"100%",background:S.time?"var(--dark)":"#e5e7eb",color:S.time?"#fff":"#9ca3af",border:"none",borderRadius:"13px",padding:"15px 0",fontSize:"15px",fontWeight:"600"},onClick:()=>{ if(S.time) setState({step:3}); }}, "Үргэлжлүүлэх →"));
    }
  }

  // STEP 3 – info
  else if(S.step===3){
    inner.appendChild(btn({style:{background:"none",border:"none",color:"var(--muted)",fontSize:"13px",marginBottom:"20px",display:"flex",alignItems:"center",gap:"5px"},onClick:()=>setState({step:2})}, "← Буцах"));
    inner.appendChild(h2({className:"serif f1",style:{fontSize:"32px",marginBottom:"8px"}},"Мэдээлэл оруулна уу"));
    inner.appendChild(p({style:{color:"var(--muted)",marginBottom:"24px",fontSize:"14px"}},[
      span({style:{background:"#f7f0f5",color:"var(--pink3)",borderRadius:"8px",padding:"3px 10px",fontSize:"13px",fontWeight:"600"}},S.selectedService?.name||""),
      " · "+S.date+" · "+S.time
    ]));
    [{key:"name",label:"Нэр",ph:"Таны нэр",type:"text"},{key:"phone",label:"Утас",ph:"9900-0000",type:"tel"},{key:"email",label:"И-мэйл",ph:"email@example.com",type:"email"}].forEach(f=>{
      const fw=div({style:{marginBottom:"18px"}});
      fw.appendChild(lbl({style:{display:"block",marginBottom:"7px",fontSize:"13px",fontWeight:"600",color:"#555"}},f.label));
      const fi=inp({type:f.type,placeholder:f.ph,value:S.form[f.key]});

      fi.addEventListener("input",e=>{ S.form[f.key]=e.target.value; });
      fw.appendChild(fi);
      if(S.errors[f.key]) fw.appendChild(p({style:{fontSize:"12px",color:"#ef4444",marginTop:"4px"}},S.errors[f.key]));
      inner.appendChild(fw);
    });
    const sum=div({style:{background:"#fdf4ff",border:"1px solid #e9d5ff",borderRadius:"14px",padding:"18px",marginBottom:"24px"}});
    sum.appendChild(p({style:{fontSize:"11px",fontWeight:"700",color:"var(--pink3)",marginBottom:"10px",letterSpacing:"1px"}},"📋 ЗАХИАЛГЫН ДЭЛГЭРЭНГҮЙ"));
    [["Үйлчилгээ",S.selectedService?.name||""],["Өдөр",S.date],["Цаг",S.time],["Үнэ",fmt(S.selectedService?.price||0)]].forEach(row=>{
      const r=div({style:{display:"flex",justifyContent:"space-between",fontSize:"13px",marginBottom:"6px"}});
      r.appendChild(span({style:{color:"var(--muted)"}},row[0]));
      r.appendChild(span({style:{fontWeight:"600",color:"var(--dark)"}},row[1]));
      sum.appendChild(r);
    });
    inner.appendChild(sum);
    const sb=btn({style:{width:"100%",background:S.loading?"#bbb":"var(--pink2)",color:"#fff",border:"none",borderRadius:"13px",padding:"16px 0",fontWeight:"700",fontSize:"15px",boxShadow:"0 4px 18px rgba(212,114,159,.35)"},onClick:async()=>{
      const e={};
      if(!S.form.name.trim()) e.name="Нэр оруулна уу";
      if(!/^\d{7,8}/.test(S.form.phone.replace(/[\s\-]/g,""))) e.phone="Утасны дугаар буруу байна";
      if(!S.form.email.includes("@")) e.email="Зөв и-мэйл оруулна уу";
      if(Object.keys(e).length){ setState({errors:e}); return; }
      setState({loading:true});
      const b={name:S.form.name,phone:S.form.phone,email:S.form.email,date:S.date,time:S.time,serviceId:S.selectedService?.id,serviceName:S.selectedService?.name,price:S.selectedService?.price||0,id:uid(),status:"pending",createdAt:new Date().toISOString()};
      const saved=await DB.addBooking(b);
      setState({lastBook:saved,page:"success",step:1,form:{name:"",phone:"",email:""},errors:{},time:"",selectedService:null,loading:false});
    }},S.loading?"Илгээж байна...":"Захиалга илгээх ✦");
    sb.disabled=S.loading;
    inner.appendChild(sb);
  }

  wrap.appendChild(inner);
  return wrap;
}

async function confirmAndEmail(booking){
  const cfg=S.settings;
  const def=`Сайн байна уу, ${booking.name}!\n\nТаны захиалга баталгаажлаа.\n\n- Үйлчилгээ: ${booking.serviceName}\n- Огноо: ${booking.date}\n- Цаг: ${booking.time}\n- Үнэ: ${fmt(booking.price)}\n\nХаяг: ${cfg.address}\nУтас: ${cfg.phone}\n\nБаярлалаа!\n${cfg.studioName}`;
  try{
    const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:400,messages:[{role:"user",content:`Write a warm confirmation email in Mongolian for ${cfg.studioName||"Glow Studio"} beauty salon. Service: ${booking.serviceName}, Date: ${booking.date}, Time: ${booking.time}, Price: ${fmt(booking.price)}. Customer: ${booking.name}. Address: ${cfg.address}. Phone: ${cfg.phone}. Short and friendly. Email body only.`}]})});
    const d=await r.json();
    showEmailModal(booking,(d.content&&d.content[0]&&d.content[0].text)||def);
  }catch(e){ showEmailModal(booking,def); }
}

  mxi.addEventListener("input",e=>{ cfg.maxSlot=parseInt(e.target.value)||1; }); slotCard.appendChild(mxi);
  slotCard.appendChild(lbl({style:{display:"block",fontSize:"11px",fontWeight:"600",color:"#777",marginBottom:"5px",textTransform:"uppercase",letterSpacing:"0.5px"}},"Цагийн slot-ууд (нэг мөрт нэг цаг)"));
  const sta=el("textarea",{placeholder:"10:00\n11:30\n13:00",style:{minHeight:"120px",fontFamily:"monospace",marginBottom:"14px",resize:"vertical"}});
  sta.value=(cfg.slots||[]).join("\n"); sta.addEventListener("input",e=>{ cfg.slots=e.target.value.split("\n").map(s=>s.trim()).filter(Boolean); }); slotCard.appendChild(sta);
  const slsb=btn({style:{width:"100%",background:"var(--dark)",color:"#fff",border:"none",borderRadius:"10px",padding:"12px",fontWeight:"600",fontSize:"14px"}},"💾 Хадгалах");
  slsb.addEventListener("click",async()=>{ slsb.textContent="⏳..."; slsb.disabled=true; await DB.saveSettings(cfg); S.settings={...cfg}; slsb.textContent="✓ Хадгалагдлаа!"; slsb.style.background="#10b981"; setTimeout(()=>{ slsb.textContent="💾 Хадгалах"; slsb.style.background="var(--dark)"; slsb.disabled=false; },2000); showToast("Цагийн тохиргоо хадгалагдлаа ✓"); });
  slotCard.appendChild(slsb); wrap.appendChild(slotCard);

  // About image
  const aImgCard=div({className:"card-box"});
  aImgCard.appendChild(h3({style:{fontSize:"15px",fontWeight:"700",marginBottom:"14px"}},"🖼️ About хэсгийн зураг"));
  if(cfg.aboutImageUrl){ aImgCard.appendChild(el("img",{src:cfg.aboutImageUrl,alt:"About",style:{width:"100%",height:"160px",objectFit:"cover",borderRadius:"12px",marginBottom:"10px",display:"block"}})); }
  const aUa=div({className:"upload-area"});
  aUa.innerHTML=`<div style="font-size:24px;margin-bottom:6px">📸</div><p style="font-size:13px;color:#888">About зураг оруулах</p>`;
  const aUfi=inp({type:"file",accept:"image/*"}); aUa.appendChild(aUfi);
  aUa.addEventListener("click",()=>aUfi.click());
  aUfi.addEventListener("change",async e=>{ const f=e.target.files[0]; if(!f) return; aUa.innerHTML=`<div style="font-size:20px">⏳</div><p style="font-size:12px;color:#999">Байршуулж байна...</p>`; try{ cfg.aboutImageUrl=await compressImage(f,1200,0.82); await DB.saveSettings(cfg); S.settings={...cfg}; showToast("Зураг хадгалагдлаа ✓"); render(); }catch(e){ aUa.innerHTML=`<p style="font-size:12px;color:#ef4444">❌ Алдаа гарлаа</p>`; } });
  aImgCard.appendChild(aUa); wrap.appendChild(aImgCard);

  return wrap;
}

// ── ADMIN CALENDAR TAB ────────────────────────────
function buildCalendarTab(){
  const cfg=S.settings;
  const slots=cfg.slots||["10:00","11:30","13:00","14:30","16:00","17:30"];
  const maxSlot=cfg.maxSlot||1;
  const wrap=div({});
  wrap.appendChild(h2({className:"serif",style:{fontSize:"26px",marginBottom:"6px"}},"Хуваарь удирдах"));
  wrap.appendChild(p({style:{color:"var(--muted)",fontSize:"14px",marginBottom:"28px"}},"Амралтын өдрүүд болон өдрийн захиалгуудыг харах"));
  const g=div({style:{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(300px,1fr))",gap:"20px"}});

  const hCard=div({className:"card-box"});
  hCard.appendChild(h3({style:{fontSize:"15px",fontWeight:"700",marginBottom:"14px"}},"🛑 Амралтын өдрүүд"));
  const hr2=div({style:{display:"flex",gap:"8px",marginBottom:"14px"}});
  const hI=inp({type:"date",style:{flex:"1"}});
  hr2.appendChild(hI);
  const addHBtn=btn({style:{background:"var(--dark)",color:"#fff",border:"none",borderRadius:"9px",padding:"0 16px",fontWeight:"600",fontSize:"13px",whiteSpace:"nowrap"}},"+ Нэмэх");
  addHBtn.addEventListener("click",async()=>{ const v=hI.value; if(v&&S.holidays.indexOf(v)<0){ await DB.addHoliday(v); hI.value=""; showToast("Нэмэгдлаа"); } });
  hr2.appendChild(addHBtn); hCard.appendChild(hr2);
  if(S.holidays.length===0){ hCard.appendChild(p({style:{color:"#ccc",fontSize:"13px"}},"Амралтын өдөр байхгүй")); }
  else { const hl=div({style:{display:"flex",flexWrap:"wrap",gap:"7px"}}); S.holidays.forEach(hd=>{ const c=div({style:{background:"#fff7ed",border:"1px solid #fed7aa",borderRadius:"8px",padding:"6px 10px",display:"flex",alignItems:"center",gap:"7px",fontSize:"13px"}}); c.appendChild(span({},"📅 "+hd)); const rb=btn({style:{background:"#fee2e2",color:"#ef4444",border:"none",borderRadius:"4px",padding:"1px 7px",fontSize:"12px",fontWeight:"700"}},"✕"); (function(d){ rb.addEventListener("click",async()=>{ await DB.removeHoliday(d); showToast("Устгагдлаа"); }); })(hd); c.appendChild(rb); hl.appendChild(c); }); hCard.appendChild(hl); }
  g.appendChild(hCard);

  const sCard=div({className:"card-box"});
  sCard.appendChild(h3({style:{fontSize:"15px",fontWeight:"700",marginBottom:"14px"}},"📊 Өдрийн захиалгын байдал"));
  const sI=inp({type:"date",value:S.schedDate,style:{marginBottom:"14px"}});
  sI.addEventListener("change",e=>setState({schedDate:e.target.value})); sCard.appendChild(sI);
  if(S.holidays.indexOf(S.schedDate)>=0){ sCard.appendChild(div({style:{background:"#fef3c7",border:"1px solid #fcd34d",borderRadius:"10px",padding:"12px 14px",fontSize:"13px",color:"#92400e"}},"⚠️ Амралтын өдөр")); }
  else {
    const sg=div({style:{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"8px"}});
    slots.forEach(t=>{ const list=S.bookings.filter(b=>b.date===S.schedDate&&b.time===t&&b.status!=="cancelled"); const used=list.length; const left=maxSlot-used; const sc2=div({style:{border:"1px solid var(--border)",borderRadius:"12px",padding:"10px 8px",background:left===0?"#fff5f5":"#fff"}}); sc2.appendChild(p({style:{fontWeight:"700",fontSize:"14px",marginBottom:"2px"}},t)); sc2.appendChild(p({style:{fontSize:"11px",fontWeight:"700",color:left===0?"#ef4444":left<=1?"#f59e0b":"#10b981"}},left===0?"Дүүрсэн":used+"/"+maxSlot)); list.forEach(b=>sc2.appendChild(p({style:{fontSize:"10px",color:"#999",marginTop:"2px"}},"• "+b.name))); sg.appendChild(sc2); });
    sCard.appendChild(sg);
  }
  g.appendChild(sCard);
  wrap.appendChild(g);
  return wrap;
}

// ── ADMIN PAGE ────────────────────────────────────
function AdminPage(){
  if(!S.adminAuthed) return AdminLoginPage();
  const cfg=S.settings;
  const wrap=div({style:{minHeight:"100vh",background:"#f6f4f5"}});
  const bar=div({className:"admin-bar"});
  const left=div({style:{display:"flex",alignItems:"center",gap:"10px"}});
  left.appendChild(span({style:{fontSize:"16px"}},"✨"));
  left.appendChild(span({className:"serif",style:{fontSize:"18px",fontWeight:"500",color:"#fff"}},cfg.studioName||"Glow Studio"));
  left.appendChild(span({style:{fontSize:"11px",background:"rgba(255,255,255,.1)",borderRadius:"6px",padding:"2px 8px",color:"#aaa"}},cfg.adminEmail));
  const right=div({style:{display:"flex",gap:"3px",alignItems:"center",flexWrap:"wrap"}});
  [["bookings","📋 Захиалга"],["services","✂️ Үйлчилгээ"],["gallery","🖼️ Галерей"],["settings","⚙️ Тохиргоо"],["calendar","📅 Хуваарь"]].forEach(item=>{
    const tb=btn({className:"admin-tab"+(S.adminTab===item[0]?" active":"")},item[1]);
    tb.addEventListener("click",()=>setState({adminTab:item[0]})); right.appendChild(tb);
  });
  const out=btn({style:{background:"none",border:"1px solid #333",color:"#777",borderRadius:"8px",padding:"5px 12px",fontSize:"12px",marginLeft:"8px"}},"Гарах");
  out.addEventListener("click",()=>{ localStorage.removeItem("gw:auth"); setState({adminAuthed:false}); }); right.appendChild(out);
  bar.appendChild(left); bar.appendChild(right); wrap.appendChild(bar);

  const inner=div({style:{maxWidth:"1100px",margin:"0 auto",padding:"28px clamp(12px,3vw,28px)"}});
  if(S.adminTab==="bookings"){
    const sw=div({id:"asc"}); sw.appendChild(buildStats()); inner.appendChild(sw);
    const tw=div({id:"atc"}); tw.appendChild(buildBookingTable()); inner.appendChild(tw);
  } else if(S.adminTab==="services"){ inner.appendChild(buildServicesTab()); }
  else if(S.adminTab==="gallery"){ inner.appendChild(buildGalleryTab()); }
  else if(S.adminTab==="settings"){
    inner.appendChild(h2({className:"serif",style:{fontSize:"26px",marginBottom:"6px"}},"Тохиргоо"));
    inner.appendChild(p({style:{color:"var(--muted)",fontSize:"14px",marginBottom:"24px"}},"Студийн бүх мэдээллийг энд удирдана уу"));
    inner.appendChild(buildSettingsTab());
  } else if(S.adminTab==="calendar"){ inner.appendChild(buildCalendarTab()); }
  wrap.appendChild(inner);
  return wrap;
}

// ── RENDER ────────────────────────────────────────
function render(){
  const app=document.getElementById("app");
  app.innerHTML="";
  let page;
  if(S.page==="home") page=HomePage();
  else if(S.page==="book") page=BookPage();
  else if(S.page==="success") page=SuccessPage();
  else if(S.page==="admin") page=AdminPage();
  else page=HomePage();
  app.appendChild(page);
  window.scrollTo(0,0);
}

// ── INIT ──────────────────────────────────────────
async function init(){
  const [bookings,holidays,settings,services,gallery]=await Promise.all([
    DB.loadBookings(),DB.loadHolidays(),DB.loadSettings(),DB.loadServices(),DB.loadGallery()
  ]);
  S.bookings=bookings; S.holidays=holidays; S.settings=settings;
  S.services=services; S.gallery=gallery;
  document.getElementById("loading-screen").style.display="none";
  document.getElementById("app").style.display="block";
  startSync(); render();
}
init();
</script>

</body>
</html>
