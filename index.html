<!DOCTYPE html>

<html lang="mn">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Glow Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300;1,9..144,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --cream:#ffffff;
  --rose:#fce4ec;
  --rose2:#f48fb1;
  --rose3:#e91e8c;
  --sage:#fce4ec;
  --sage2:#e91e8c;
  --terra:#e91e8c;
  --dark:#880e4f;
  --text:#4a0030;
  --muted:#c2709a;
  --border:#f8bbd0;
  --card:#fff0f5;
}
html{scroll-behavior:smooth;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);overflow-x:hidden;}
.serif{font-family:'Fraunces',serif;}

/* Grain overlay */
body::before{content:’’;position:fixed;inset:0;background-image:url(“data:image/svg+xml,%3Csvg viewBox=‘0 0 256 256’ xmlns=‘http://www.w3.org/2000/svg’%3E%3Cfilter id=‘noise’%3E%3CfeTurbulence type=‘fractalNoise’ baseFrequency=‘0.9’ numOctaves=‘4’ stitchTiles=‘stitch’/%3E%3C/filter%3E%3Crect width=‘100%25’ height=‘100%25’ filter=‘url(%23noise)’ opacity=‘0.03’/%3E%3C/svg%3E”);pointer-events:none;z-index:0;opacity:.4;}

input,select,textarea{font-family:‘DM Sans’,sans-serif;outline:none;border:1.5px solid var(–border);border-radius:14px;padding:13px 16px;font-size:14px;background:var(–card);width:100%;transition:border-color .25s,box-shadow .25s,background .25s;}
input:focus,select:focus,textarea:focus{border-color:var(–rose2);box-shadow:0 0 0 4px rgba(212,160,160,.12);background:#fff;}
button{cursor:pointer;font-family:‘DM Sans’,sans-serif;}

@keyframes fadeUp{from{opacity:0;transform:translateY(28px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
@keyframes blob{0%,100%{border-radius:60% 40% 30% 70%/60% 30% 70% 40%;}50%{border-radius:30% 60% 70% 40%/50% 60% 30% 60%;}}

.f1{animation:fadeUp .6s .05s ease both;}
.f2{animation:fadeUp .6s .15s ease both;}
.f3{animation:fadeUp .6s .25s ease both;}
.f4{animation:fadeUp .6s .35s ease both;}
.f5{animation:fadeUp .6s .45s ease both;}

/* NAV */
nav{position:sticky;top:0;z-index:200;height:68px;background:rgba(250,246,241,.92);backdrop-filter:blur(20px);border-bottom:1px solid rgba(236,221,213,.6);display:flex;align-items:center;justify-content:space-between;padding:0 clamp(20px,5vw,56px);}
.nav-logo{display:flex;align-items:center;gap:12px;background:none;border:none;cursor:pointer;}
.nav-petal{width:28px;height:28px;background:linear-gradient(135deg,var(–rose),var(–rose3));border-radius:60% 40% 30% 70%/60% 30% 70% 40%;animation:blob 6s ease-in-out infinite;}
.nav-name{font-family:‘Fraunces’,serif;font-size:20px;font-weight:400;color:var(–dark);letter-spacing:-.3px;}
.nav-links{display:flex;gap:4px;align-items:center;}
.nav-btn{background:none;border:none;color:var(–muted);border-radius:100px;padding:8px 18px;font-size:13px;font-weight:500;transition:all .2s;}
.nav-btn:hover{color:var(–text);background:rgba(200,160,160,.1);}
.nav-btn.active{color:var(–dark);background:var(–rose);color:#fff;}
.nav-admin{background:none;border:1.5px solid var(–border);color:var(–muted);border-radius:100px;padding:7px 14px;font-size:12px;margin-left:6px;transition:all .2s;}
.nav-admin:hover{border-color:var(–rose2);color:var(–rose3);}

/* HERO */
.hero{min-height:96vh;display:grid;place-items:center;padding:80px clamp(20px,5vw,60px);position:relative;overflow:hidden;}
.hero-blob1{position:absolute;width:500px;height:500px;background:radial-gradient(circle,rgba(250,218,221,.5),transparent 70%);top:-100px;right:-100px;border-radius:50%;pointer-events:none;}
.hero-blob2{position:absolute;width:400px;height:400px;background:radial-gradient(circle,rgba(244,167,185,.25),transparent 70%);bottom:-80px;left:-80px;border-radius:50%;pointer-events:none;}
.hero-blob3{position:absolute;width:200px;height:200px;background:radial-gradient(circle,rgba(224,112,144,.12),transparent 70%);top:30%;left:10%;border-radius:50%;pointer-events:none;}
.hero-inner{text-align:center;max-width:720px;position:relative;z-index:1;}
.hero-tag{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.7);border:1px solid var(–border);border-radius:100px;padding:8px 22px;font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(–terra);margin-bottom:36px;backdrop-filter:blur(8px);}
.hero-tag-dot{width:6px;height:6px;border-radius:50%;background:var(–terra);animation:float 2s ease-in-out infinite;}
.hero-title{font-family:‘Fraunces’,serif;font-size:clamp(52px,10vw,104px);font-weight:300;line-height:1.0;color:var(–dark);margin-bottom:24px;letter-spacing:-2px;}
.hero-title em{font-style:italic;color:var(–rose3);}
.hero-title span{display:block;}
.hero-sub{font-size:16px;color:var(–muted);line-height:1.9;max-width:440px;margin:0 auto 52px;}
.hero-cta{display:inline-flex;align-items:center;gap:12px;background:var(–dark);color:#fff;border:none;border-radius:100px;padding:18px 44px;font-size:15px;font-weight:500;letter-spacing:.3px;box-shadow:0 12px 40px rgba(44,32,24,.2);transition:transform .25s,box-shadow .25s;}
.hero-cta:hover{transform:translateY(-3px);box-shadow:0 18px 50px rgba(44,32,24,.25);}
.hero-cta-arrow{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:14px;}
.hero-scroll{position:absolute;bottom:36px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:8px;color:var(–muted);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;}
.hero-scroll-line{width:1px;height:48px;background:linear-gradient(to bottom,var(–border),transparent);animation:float 2s ease-in-out infinite;}

/* SECTION */
.section{padding:96px clamp(20px,5vw,64px);position:relative;}
.sec-eyebrow{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.sec-eyebrow-line{width:32px;height:1.5px;background:var(–terra);}
.sec-eyebrow-text{font-size:11px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:var(–terra);}
.sec-title{font-family:‘Fraunces’,serif;font-size:clamp(32px,5vw,52px);font-weight:300;line-height:1.1;color:var(–dark);letter-spacing:-1px;}
.sec-title em{font-style:italic;color:var(–rose3);}

/* SERVICE CARDS */
.svc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:20px;max-width:1100px;margin:48px auto 0;}
.svc-card{background:var(–card);border-radius:28px;overflow:hidden;border:1px solid var(–border);transition:transform .3s,box-shadow .3s;cursor:pointer;position:relative;}
.svc-card::before{content:’’;position:absolute;inset:0;background:linear-gradient(135deg,rgba(232,196,196,.08),rgba(200,213,192,.05));opacity:0;transition:opacity .3s;}
.svc-card:hover{transform:translateY(-6px);box-shadow:0 24px 60px rgba(44,32,24,.1);}
.svc-card:hover::before{opacity:1;}
.svc-img{width:100%;height:190px;object-fit:cover;display:block;}
.svc-img-ph{width:100%;height:150px;display:flex;align-items:center;justify-content:center;font-size:52px;background:linear-gradient(135deg,rgba(232,196,196,.2),rgba(200,213,192,.15));}
.svc-body{padding:22px 24px 24px;}
.svc-name{font-family:‘Fraunces’,serif;font-size:20px;font-weight:400;color:var(–dark);margin-bottom:6px;letter-spacing:-.3px;}
.svc-desc{font-size:13px;color:var(–muted);line-height:1.65;margin-bottom:16px;}
.svc-subs{display:flex;flex-direction:column;gap:5px;margin-bottom:16px;}
.svc-sub-row{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;background:rgba(236,221,213,.3);border-radius:10px;}
.svc-sub-name{font-size:13px;color:var(–text);}
.svc-sub-price{font-size:13px;font-weight:600;color:var(–rose3);}
.svc-book-link{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:var(–terra);background:none;border:none;padding:0;transition:gap .2s;}
.svc-book-link:hover{gap:10px;}

/* GALLERY */
.gal-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px;max-width:1100px;margin:48px auto 0;}
.gal-item{border-radius:22px;overflow:hidden;aspect-ratio:1;position:relative;background:var(–border);cursor:pointer;}
.gal-item img{width:100%;height:100%;object-fit:cover;transition:transform .5s ease;}
.gal-item:hover img{transform:scale(1.08);}
.gal-ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(44,32,24,.5),transparent);opacity:0;transition:opacity .3s;display:flex;align-items:flex-end;padding:16px;}
.gal-item:hover .gal-ov{opacity:1;}
.gal-caption{color:#fff;font-size:13px;font-weight:500;}

/* ABOUT */
.about-wrap{max-width:1000px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:72px;align-items:center;}
@media(max-width:680px){.about-wrap{grid-template-columns:1fr;gap:36px;}}
.about-img-wrap{position:relative;}
.about-img-frame{border-radius:40px;overflow:hidden;aspect-ratio:3/4;background:linear-gradient(135deg,rgba(232,196,196,.3),rgba(200,213,192,.2));display:flex;align-items:center;justify-content:center;font-size:80px;}
.about-img-frame img{width:100%;height:100%;object-fit:cover;}
.about-img-badge{position:absolute;bottom:-16px;right:-16px;background:#fff;border:1px solid var(–border);border-radius:20px;padding:14px 20px;box-shadow:0 8px 32px rgba(44,32,24,.1);}
.about-img-badge p{font-size:11px;color:var(–muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:2px;}
.about-img-badge strong{font-family:‘Fraunces’,serif;font-size:22px;font-weight:400;color:var(–dark);}
.about-text .sec-title{margin-bottom:20px;}
.about-body{font-size:15px;color:var(–muted);line-height:1.95;margin-bottom:32px;}
.about-cta{display:inline-flex;align-items:center;gap:10px;background:var(–rose);color:#fff;border:none;border-radius:100px;padding:14px 32px;font-size:14px;font-weight:500;transition:background .2s,transform .2s;}
.about-cta:hover{background:var(–rose3);transform:translateY(-2px);}

/* INFO CARDS */
.info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;max-width:900px;margin:0 auto;}
.info-card{background:var(–card);border:1px solid var(–border);border-radius:24px;padding:28px 24px;transition:transform .25s;}
.info-card:hover{transform:translateY(-3px);}
.info-icon{font-size:28px;margin-bottom:14px;}
.info-label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(–terra);margin-bottom:6px;}
.info-val{font-size:14px;color:var(–text);line-height:1.65;}

/* FOOTER */
footer{background:var(–dark);padding:60px clamp(20px,5vw,64px) 36px;}
.foot-inner{max-width:980px;margin:0 auto;}
.foot-top{display:flex;justify-content:space-between;flex-wrap:wrap;gap:40px;padding-bottom:40px;border-bottom:1px solid rgba(255,255,255,.08);margin-bottom:28px;}
.foot-brand-name{font-family:‘Fraunces’,serif;font-size:28px;font-weight:300;color:#fff;margin-bottom:10px;letter-spacing:-.5px;}
.foot-brand-sub{font-size:13px;color:rgba(255,255,255,.35);line-height:1.8;}
.foot-links-title{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.25);margin-bottom:14px;}
.foot-links a{display:flex;align-items:center;gap:8px;color:rgba(255,255,255,.4);text-decoration:none;font-size:14px;margin-bottom:10px;transition:color .2s;}
.foot-links a:hover{color:rgba(255,255,255,.8);}
.foot-copy{font-size:12px;color:rgba(255,255,255,.2);text-align:center;}

/* BOOK PAGE */
.book-wrap{max-width:600px;margin:0 auto;padding:56px clamp(20px,4vw,40px);}
.stepper{display:flex;align-items:center;margin-bottom:52px;}
.step-node{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0;transition:all .3s;}
.step-done{background:var(–dark);color:#fff;}
.step-active{background:var(–rose2);color:#fff;}
.step-idle{background:var(–border);color:var(–muted);}
.step-label{margin-left:8px;font-size:12px;font-weight:500;white-space:nowrap;}
.step-line{flex:1;height:1.5px;margin:0 8px;transition:background .3s;}
.step-line-done{background:var(–dark);}
.step-line-idle{background:var(–border);}

/* Slot */
.slot-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:24px;}
.slot-btn{border-radius:16px;padding:14px 8px;border:1.5px solid var(–border);background:var(–card);transition:all .2s;text-align:center;cursor:pointer;}
.slot-btn:hover:not(:disabled){border-color:var(–rose2);background:#fff;}
.slot-btn.sel{border-color:var(–dark);background:var(–dark);color:#fff;}
.slot-btn.full{border-color:var(–border);background:var(–card);color:var(–border);cursor:not-allowed;opacity:.6;}
.slot-btn.partial{border-color:rgba(200,149,122,.4);background:rgba(200,149,122,.06);}

/* Summary box */
.sum-box{background:linear-gradient(135deg,rgba(232,196,196,.15),rgba(200,213,192,.1));border:1px solid var(–border);border-radius:20px;padding:20px;margin-bottom:24px;}
.sum-row{display:flex;justify-content:space-between;font-size:13px;margin-bottom:8px;}
.sum-label{color:var(–muted);}
.sum-val{font-weight:600;color:var(–dark);}

/* Buttons */
.btn-primary{width:100%;background:var(–dark);color:#fff;border:none;border-radius:100px;padding:16px 0;font-size:15px;font-weight:500;letter-spacing:.3px;transition:transform .2s,box-shadow .2s;}
.btn-primary:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 12px 36px rgba(44,32,24,.2);}
.btn-primary:disabled{background:#c0b0a8;cursor:not-allowed;}
.btn-secondary{width:100%;background:transparent;color:var(–muted);border:1.5px solid var(–border);border-radius:100px;padding:14px 0;font-size:14px;font-weight:500;transition:all .2s;}
.btn-secondary:hover{border-color:var(–rose2);color:var(–rose3);}
.btn-back{background:none;border:none;color:var(–muted);font-size:13px;display:flex;align-items:center;gap:6px;margin-bottom:24px;cursor:pointer;transition:color .2s;}
.btn-back:hover{color:var(–text);}

/* Tags */
.tag-pill{display:inline-flex;align-items:center;gap:5px;background:rgba(232,196,196,.2);border:1px solid rgba(232,196,196,.5);border-radius:100px;padding:4px 14px;font-size:13px;font-weight:500;color:var(–rose3);}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(44,32,24,.55);backdrop-filter:blur(6px);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px;}
.modal{background:var(–card);border-radius:28px;padding:32px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 32px 80px rgba(44,32,24,.2);}

/* Admin */
.admin-bar{background:var(–dark);display:flex;align-items:center;justify-content:space-between;padding:0 clamp(16px,4vw,40px);min-height:62px;flex-wrap:wrap;gap:8px;padding-top:8px;padding-bottom:8px;}
.atab{background:none;border:none;color:rgba(255,255,255,.35);border-radius:100px;padding:7px 14px;font-size:13px;font-weight:500;transition:all .2s;}
.atab.on{background:rgba(255,255,255,.12);color:#fff;}
.atab:hover{color:rgba(255,255,255,.7);}
.acard{background:#fff;border-radius:20px;padding:24px;box-shadow:0 1px 12px rgba(0,0,0,.05);}
.pill{border-radius:100px;padding:3px 12px;font-size:11px;font-weight:700;}
.upload-area{border:2px dashed var(–border);border-radius:16px;padding:32px;text-align:center;cursor:pointer;transition:all .2s;}
.upload-area:hover,.upload-area.drag{border-color:var(–rose2);background:rgba(232,196,196,.06);}
.upload-area input[type=file]{display:none;}
.lbl{display:block;font-size:11px;font-weight:700;color:var(–muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:7px;}

/* Loading */
#loading-screen{position:fixed;inset:0;background:var(–cream);z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;}
.spinner{width:36px;height:36px;border:2.5px solid var(–border);border-top-color:var(–rose2);border-radius:50%;animation:spin .7s linear infinite;}

/* Toast */
#toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(90px);background:var(–dark);color:#fff;padding:13px 28px;border-radius:100px;font-size:13px;font-weight:500;z-index:99999;transition:transform .35s cubic-bezier(.34,1.56,.64,1);pointer-events:none;white-space:nowrap;}
#toast.show{transform:translateX(-50%) translateY(0);}

/* SC Responsive */
@media(max-width:480px){
.slot-grid{grid-template-columns:repeat(2,1fr);}
.about-img-badge{display:none;}
}
</style>

</head>

</div>

// ── Image compress ──────────────────────────────
function compressImage(file,maxW=900,q=0.78){
  return new Promise((res,rej)=>{
    const img=new Image(),url=URL.createObjectURL(file);
    img.onload=()=>{
      let w=img.width,h=img.height;
      if(w>maxW){h=Math.round(h*maxW/w);w=maxW;}
      const c=document.createElement("canvas");
      c.width=w;c.height=h;
      c.getContext("2d").drawImage(img,0,0,w,h);
      URL.revokeObjectURL(url);
      res(c.toDataURL("image/jpeg",q));
    };
    img.onerror=rej;img.src=url;
  });
}

function fmt(n){return(n||0).toLocaleString()+"₮";}
function uid(){return Date.now().toString(36).toUpperCase()+Math.random().toString(36).slice(2,5).toUpperCase();}
function today(){return new Date().toISOString().slice(0,10);}
function timeToMin(t){const[h,m]=t.split(":").map(Number);return h*60+m;}
function minToTime(m){return`${String(Math.floor(m/60)).padStart(2,"0")}:${String(m%60).padStart(2,"0")}`;}
function showToast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2800);}

function genSlots(cfg){
  const dur=cfg.slotDuration||90;
  const first=timeToMin(cfg.firstSlot||"10:00");
  const last=timeToMin(cfg.lastSlot||"20:00");
  const slots=[];
  for(let t=first;t<=last;t+=dur)slots.push(minToTime(t));
  return slots;
}

function getSlotInfo(date,slotTime,svcId,subDuration,bookings){
  const slotMin=timeToMin(slotTime);
  const slotEnd=slotMin+(subDuration||90);
  const svc=S.services.find(s=>s.id===svcId)||DEF_SVCS.find(s=>s.id===svcId);
  const cap=svc?(svc.capacity||1):1;
  const overlapping=bookings.filter(b=>{
    if(b.date!==date||b.serviceId!==svcId||b.status==="cancelled")return false;
    const bMin=timeToMin(b.time);
    const bEnd=bMin+(b.duration||90);
    return slotMin<bEnd&&slotEnd>bMin;
  });
  const used=overlapping.length;
  return{used,left:cap-used,cap,full:cap-used<=0};
}

function el(tag,attrs,children){
  const e=document.createElement(tag);
  if(attrs)Object.keys(attrs).forEach(k=>{
    if(k==="style"&&typeof attrs[k]==="object")Object.assign(e.style,attrs[k]);
    else if(k==="className")e.className=attrs[k];
    else if(k==="html")e.innerHTML=attrs[k];
    else if(k.startsWith("on"))e.addEventListener(k.slice(2).toLowerCase(),attrs[k]);
    else e.setAttribute(k,attrs[k]);
  });
  if(children){if(!Array.isArray(children))children=[children];children.forEach(c=>{if(c==null)return;c instanceof Node?e.appendChild(c):e.appendChild(document.createTextNode(String(c)));});}
  return e;
}

  left.appendChild(span({style:{fontSize:"11px",background:"rgba(255,255,255,.08)",borderRadius:"100px",padding:"2px 10px",color:"rgba(255,255,255,.4)"}},auth.currentUser?.email||""));
  const right=div({style:{display:"flex",gap:"2px",alignItems:"center",flexWrap:"wrap"}});
  [["bookings","📋 Захиалга"],["services","✂️ Үйлчилгээ"],["gallery","🖼️ Галерей"],["settings","⚙️ Тохиргоо"],["calendar","📅 Хуваарь"]].forEach(item=>{
    const tb=btn({className:"atab"+(S.adminTab===item[0]?" on":"")},item[1]);
    tb.addEventListener("click",()=>setState({adminTab:item[0]}));right.appendChild(tb);
  });
  const out=btn({style:{background:"none",border:"1px solid rgba(255,255,255,.12)",color:"rgba(255,255,255,.35)",borderRadius:"100px",padding:"5px 14px",fontSize:"12px",marginLeft:"8px",cursor:"pointer"}},"Гарах");
  out.addEventListener("click",async()=>{await signOut(auth);setState({adminAuthed:false});});right.appendChild(out);
  bar.appendChild(left);bar.appendChild(right);wrap.appendChild(bar);
  const inner=div({style:{maxWidth:"1100px",margin:"0 auto",padding:"24px clamp(12px,3vw,24px)"}});
  if(S.adminTab==="bookings"){const sw=div({id:"asc"});sw.appendChild(buildStats());inner.appendChild(sw);const tw=div({id:"atc"});tw.appendChild(buildBookingTable());inner.appendChild(tw);}
  else if(S.adminTab==="services")inner.appendChild(buildServicesTab());
  else if(S.adminTab==="gallery")inner.appendChild(buildGalleryTab());
  else if(S.adminTab==="settings"){
    inner.appendChild(h2({className:"serif",style:{fontSize:"24px",fontWeight:"300",marginBottom:"6px",color:"var(--dark)"}},"Тохиргоо"));
    inner.appendChild(p({style:{color:"var(--muted)",fontSize:"13px",marginBottom:"20px"}},"Студийн бүх мэдээллийг энд удирдана уу"));
    inner.appendChild(buildSettingsTab());
  }else if(S.adminTab==="calendar")inner.appendChild(buildCalendarTab());
  wrap.appendChild(inner);return wrap;
}

// ── RENDER ────────────────────────────────────────
function render(){
  const appEl=document.getElementById("app");appEl.innerHTML="";
  let page;
  if(S.page==="home")page=HomePage();
  else if(S.page==="book")page=BookPage();
  else if(S.page==="success")page=SuccessPage();
  else if(S.page==="admin")page=AdminPage();
  else page=HomePage();
  appEl.appendChild(page);
  window.scrollTo(0,0);
}

// ── INIT ──────────────────────────────────────────
async function init(){
  const[bookings,holidays,settings,services,gallery]=await Promise.all([
    DB.loadBookings(),DB.loadHolidays(),DB.loadSettings(),DB.loadServices(),DB.loadGallery()
  ]);
  S.bookings=bookings;S.holidays=holidays;S.settings=settings;S.services=services;S.gallery=gallery;
  document.getElementById("loading-screen").style.display="none";
  document.getElementById("app").style.display="block";
  onAuthStateChanged(auth,user=>{S.adminAuthed=!!user;render();});
  startSync();render();
}
init();
</script>
