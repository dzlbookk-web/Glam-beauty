*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{

  --dark:#1c1218;--cream:#fdf8f5;
  --border:#f0e4ec;--text:#2d1f27;--muted:#9e8490;

body{font-family:'Outfit',sans-serif;background:var(--cream);color:var(--text);}
.serif{font-family:'Playfair Display',serif;}
input,select,textarea{font-family:'Outfit',sans-serif;outline:none;border:1.5px solid var(--border);border-radius:12px;padding:12px 16px;font-size:14px;background:#fff;width:100%;transition:border-color .2s,box-shadow .2s;}
input:focus,select:focus,textarea:focus{border-color:var(--pink2);box-shadow:0 0 0 3px rgba(212,114,159,.12);}
button{cursor:pointer;font-family:'Outfit',sans-serif;}

@keyframes spin{to{transform:rotate(360deg);}}
.f1{animation:fadeUp .5s ease both;}
.f2{animation:fadeUp .5s .08s ease both;}
.f3{animation:fadeUp .5s .16s ease both;}
.f4{animation:fadeUp .5s .24s ease both;}

nav{position:sticky;top:0;z-index:200;height:64px;background:rgba(253,248,245,.96);backdrop-filter:blur(16px);border-bottom:1px solid var(–border);display:flex;align-items:center;justify-content:space-between;padding:0 clamp(16px,5vw,52px);}
.nav-logo{display:flex;align-items:center;gap:10px;background:none;border:none;cursor:pointer;}
.nav-dot{width:10px;height:10px;border-radius:50%;background:linear-gradient(135deg,var(–pink),var(–pink3));}

.hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(232,160,191,.18),transparent 70%),radial-gradient(ellipse 50% 40% at 80% 80%,rgba(181,80,125,.08),transparent 60%);pointer-events:none;}
.hero-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.8);border:1px solid var(–border);border-radius:100px;padding:7px 22px;font-size:11px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:var(–pink3);margin-bottom:32px;}
.hero-title{font-size:clamp(44px,9vw,90px);font-weight:400;line-height:1.05;color:var(–dark);margin-bottom:20px;}
.hero-title em{font-style:italic;color:var(–pink3);}
.hero-sub{font-size:16px;color:var(–muted);max-width:460px;line-height:1.85;margin-bottom:48px;}
.hero-btn{background:var(–dark);color:#fff;border:none;border-radius:14px;padding:16px 44px;font-size:15px;font-weight:600;box-shadow:0 8px 28px rgba(28,18,24,.18);transition:transform .2s,box-shadow .2s;}
.hero-btn:hover{transform:translateY(-2px);}

.section{padding:80px clamp(16px,5vw,64px);}
.sec-label{font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(–pink2);margin-bottom:10px;}
.sec-title{font-size:clamp(28px,4vw,44px);font-weight:400;line-height:1.15;margin-bottom:44px;}

/* Service cards on home */

.svc-card{background:#fff;border-radius:22px;overflow:hidden;border:1.5px solid var(–border);transition:transform .25s,box-shadow .25s;cursor:pointer;}
.svc-card:hover{transform:translateY(-4px);box-shadow:0 14px 44px rgba(28,18,24,.09);}
.svc-img{width:100%;height:175px;object-fit:cover;display:block;}
.svc-img-ph{width:100%;height:140px;display:flex;align-items:center;justify-content:center;font-size:44px;background:linear-gradient(135deg,#fdf0f7,#f5e8f2);}
.svc-body{padding:18px;}
.svc-name{font-size:16px;font-weight:700;margin-bottom:4px;}
.svc-desc{font-size:13px;color:var(–muted);line-height:1.55;margin-bottom:12px;}
.svc-sub-list{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;}
.svc-sub-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:6px 10px;background:#fdf4ff;border-radius:8px;}

.book-link{display:inline-flex;align-items:center;gap:5px;font-size:13px;font-weight:600;color:var(–pink3);background:none;border:none;padding:0;}

.gal-item{border-radius:16px;overflow:hidden;aspect-ratio:1;position:relative;background:var(–border);cursor:pointer;}

/* About */

.stepper{display:flex;align-items:center;margin-bottom:44px;}
.step-dot{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}

/* Slot btn */
.slot-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:24px;}
.slot-btn{border-radius:13px;padding:12px 8px;border:2px solid var(–border);background:#fff;transition:all .15s;text-align:center;}
.slot-btn.sel{border-color:var(–dark);background:var(–dark);color:#fff;}
.slot-btn.full{border-color:#f0e4ec;background:#fafafa;color:#ccc;cursor:not-allowed;}
.slot-btn.partial{border-color:#fcd34d;background:#fffbeb;}

/* Admin */
.admin-bar{background:var(–dark);display:flex;align-items:center;justify-content:space-between;padding:0 clamp(16px,4vw,40px);min-height:60px;flex-wrap:wrap;gap:8px;padding-top:8px;padding-bottom:8px;}

.upload-area{border:2px dashed var(–border);border-radius:14px;padding:28px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;}

.upload-area input[type=file]{display:none;}
.pill{border-radius:100px;padding:3px 10px;font-size:11px;font-weight:700;}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(28,18,24,.6);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px;}
.modal{background:#fff;border-radius:22px;padding:28px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3);}

/* Loading */
#loading-screen{position:fixed;inset:0;background:var(–cream);z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;}
.spinner{width:36px;height:36px;border:3px solid var(–border);border-top-color:var(–pink2);border-radius:50%;animation:spin .7s linear infinite;}

/* Toast */
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:var(–dark);color:#fff;padding:12px 24px;border-radius:100px;font-size:13px;font-weight:500;z-index:99999;transition:transform .3s;pointer-events:none;white-space:nowrap;}
#toast.show{transform:translateX(-50%) translateY(0);}

.lbl{display:block;font-size:11px;font-weight:700;color:var(–muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.mb12{margin-bottom:12px;}
.mb16{margin-bottom:16px;}
.mb20{margin-bottom:20px;}

// ── Image compress → base64 ───────────────────────
function compressImage(file, maxW=900, q=0.78){
  return new Promise((res,rej)=>{
    const img=new Image(), url=URL.createObjectURL(file);
    img.onload=()=>{
      let w=img.width, h=img.height;
      if(w>maxW){h=Math.round(h*maxW/w);w=maxW;}
      const c=document.createElement("canvas");
      c.width=w; c.height=h;
      c.getContext("2d").drawImage(img,0,0,w,h);
      URL.revokeObjectURL(url);
      res(c.toDataURL("image/jpeg",q));
    };
    img.onerror=rej; img.src=url;
  });
}

// ── Slot logic ────────────────────────────────────
// Цагийг минут болгох
function timeToMin(t){ const [h,m]=t.split(":").map(Number); return h*60+m; }
function minToTime(m){ const h=Math.floor(m/60); const mm=m%60; return `${String(h).padStart(2,"0")}:${String(mm).padStart(2,"0")}`; }

// Slot-уудыг firstSlot, lastSlot, slotDuration-аас үүсгэх
function genSlots(cfg){
  const dur=cfg.slotDuration||90;
  const svcDur=cfg.serviceDuration||90;
  const first=timeToMin(cfg.firstSlot||"10:00");
  const last=timeToMin(cfg.lastSlot||"20:00");
  const slots=[];
  for(let t=first; t<=last; t+=dur){ slots.push(minToTime(t)); }
  return slots;
}

// Тухайн үйлчилгээний slot боломжтой эсэх шалгах
// Нэг захиалга = serviceDuration минут эзэлдэг
// Тиймээс [startMin, startMin+serviceDuration) хооронд давхцах захиалгуудыг шалгана
function getSlotInfo(date, slotTime, svcId, cfg, bookings){
  const dur = cfg.serviceDuration || 90;
  const slotMin = timeToMin(slotTime);
  const slotEnd = slotMin + dur;

  // Тухайн үйлчилгээний capacity
  const svc = S.services.find(s=>s.id===svcId) || DEF_SERVICES.find(s=>s.id===svcId);
  const cap = svc ? (svc.capacity||1) : 1;

  // Давхцаж байгаа захиалгуудыг тоол
  // Захиалга [bookStart, bookStart+dur) хооронд байвал давхцана
  const overlapping = bookings.filter(b=>{
    if(b.date!==date || b.serviceId!==svcId || b.status==="cancelled") return false;
    const bMin = timeToMin(b.time);
    const bEnd = bMin + dur;
    // [slotMin, slotEnd) ба [bMin, bEnd) давхцах
    return slotMin < bEnd && slotEnd > bMin;
  });

  const used = overlapping.length;
  const left = cap - used;
  return { used, left, cap, full: left<=0 };
}

// ── DB ────────────────────────────────────────────

// ── DOM helpers ───────────────────────────────────
function el(tag,attrs,children){
  const e=document.createElement(tag);
  if(attrs) Object.keys(attrs).forEach(k=>{
    if(k==="style"&&typeof attrs[k]==="object") Object.assign(e.style,attrs[k]);
    else if(k==="className") e.className=attrs[k];
    else if(k==="html") e.innerHTML=attrs[k];
    else if(k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(),attrs[k]);
    else e.setAttribute(k,attrs[k]);
  });
  if(children){ if(!Array.isArray(children))children=[children]; children.forEach(c=>{ if(c==null)return; c instanceof Node?e.appendChild(c):e.appendChild(document.createTextNode(String(c))); }); }
  return e;
}
const div=(a,c)=>el("div",a,c);

const span=(a,c)=>el("span",a,c);
const inp=(a)=>el("input",a);
const h1=(a,c)=>el("h1",a,c);
const h2=(a,c)=>el("h2",a,c);
const h3=(a,c)=>el("h3",a,c);
const lbl=(a,c)=>el("label",a,c);

// ── NAV ───────────────────────────────────────────
function Nav(active){
  const cfg=S.settings;
  const nav=el("nav");
  const logo=el("button",{className:"nav-logo",onClick:()=>setState({page:"home"})},[ div({className:"nav-dot"}), span({className:"serif",style:{fontSize:"20px",fontWeight:"500",color:"var(--dark)"}},cfg.studioName||"Glow Studio") ]);
  const right=div({style:{display:"flex",gap:"5px",alignItems:"center"}},[
    btn({style:{background:active==="home"?"var(--dark)":"transparent",color:active==="home"?"#fff":"var(--muted)",border:"none",borderRadius:"9px",padding:"8px 16px",fontSize:"13px",fontWeight:"500"},onClick:()=>setState({page:"home"})},"Нүүр"),
    btn({style:{background:active==="book"?"var(--dark)":"transparent",color:active==="book"?"#fff":"var(--muted)",border:"none",borderRadius:"9px",padding:"8px 16px",fontSize:"13px",fontWeight:"500"},onClick:()=>setState({page:"book",step:1,selService:null,selSub:null,time:""})},"Цаг захиалах"),
    btn({style:{background:"transparent",color:"#ccc",border:"1px solid var(--border)",borderRadius:"9px",padding:"8px 12px",fontSize:"12px",marginLeft:"4px"},onClick:()=>setState({page:"admin"})},"⚙")
  ]);
  nav.appendChild(logo); nav.appendChild(right);
  return nav;
}

// ── HOME ──────────────────────────────────────────
function HomePage(){
  const cfg=S.settings;
  const svcs=S.services.length>0?S.services:DEF_SERVICES;
  const wrap=div({});
  wrap.appendChild(Nav("home"));

  // Hero
  const hero=div({className:"hero"});
  hero.appendChild(div({className:"hero-bg"}));
  hero.appendChild(div({className:"hero-badge f1"},["✦ ",cfg.studioName||"Glow Studio"," ✦"]));
  const ht=h1({className:"serif hero-title f2"});
  ht.innerHTML=cfg.tagline||"Өөрийгөө <em>илэрхийлэх</em> газар";
  hero.appendChild(ht);
  hero.appendChild(p({className:"hero-sub f3"},"Мэргэжлийн гоо сайхны үйлчилгээгээр өөрийгөө хайрлаарай."));
  hero.appendChild(div({className:"f4"},[btn({className:"hero-btn",onClick:()=>setState({page:"book",step:1,selService:null,selSub:null,time:""})},"Цаг захиалах →")]));
  wrap.appendChild(hero);

  // Services
  const secS=div({className:"section",style:{background:"#fff",textAlign:"center"}});
  secS.appendChild(p({className:"sec-label"},"ҮЙЛЧИЛГЭЭ"));
  secS.appendChild(h2({className:"serif sec-title"},"Манай үйлчилгээнүүд"));
  const sg=div({className:"svc-grid"});
  svcs.forEach(svc=>{
    const card=div({className:"svc-card"});
    if(svc.imageUrl) card.appendChild(el("img",{src:svc.imageUrl,alt:svc.name,className:"svc-img"}));
    else card.appendChild(div({className:"svc-img-ph"},svc.emoji||"💄"));
    const body=div({className:"svc-body"});
    body.appendChild(p({className:"svc-name"},[svc.emoji?" ":"",svc.emoji||"",svc.emoji?" ":"",svc.name]));
    if(svc.desc) body.appendChild(p({className:"svc-desc"},svc.desc));
    // Дэд төрлүүд
    const subs=svc.subs||[];
    if(subs.length>0){
      const sl=div({className:"svc-sub-list"});
      subs.slice(0,3).forEach(sub=>{
        const row=div({className:"svc-sub-row"});
        row.appendChild(span({className:"svc-sub-name"},sub.name));
        row.appendChild(span({className:"svc-sub-price"},fmt(sub.price)));
        sl.appendChild(row);
      });
      if(subs.length>3) sl.appendChild(p({style:{fontSize:"12px",color:"var(--muted)",paddingLeft:"4px",marginTop:"2px"}},"+ "+(subs.length-3)+" төрөл"));
      body.appendChild(sl);
    }
    body.appendChild(btn({className:"book-link",onClick:()=>setState({page:"book",step:1,selService:svc,selSub:null,time:""})},"Цаг захиалах →"));
    card.appendChild(body);
    sg.appendChild(card);
  });
  secS.appendChild(sg);
  wrap.appendChild(secS);

  // Gallery
  if(S.gallery.length>0){
    const secG=div({className:"section",style:{textAlign:"center"}});
    secG.appendChild(p({className:"sec-label"},"ГАЛЕРЕЙ"));
    secG.appendChild(h2({className:"serif sec-title"},"Манай ажлуудаас"));
    const gg=div({className:"gal-grid"});
    S.gallery.forEach(item=>{
      const gi=div({className:"gal-item"});
      if(item.imageUrl) gi.appendChild(el("img",{src:item.imageUrl,alt:item.caption||""}));
      const ov=div({className:"gal-ov"});
      if(item.caption) ov.appendChild(span({style:{color:"#fff",fontSize:"13px",fontWeight:"600",textAlign:"center"}},item.caption));
      gi.appendChild(ov);
      gg.appendChild(gi);
    });
    secG.appendChild(gg);
    wrap.appendChild(secG);
  }

  // About
  const secA=div({className:"about-section",style:{background:"#fff",padding:"80px clamp(16px,5vw,64px)"}});
  const ai=div({className:"about-inner"});
  const aImg=div({className:"about-img-wrap"});
  if(cfg.aboutImageUrl) aImg.appendChild(el("img",{src:cfg.aboutImageUrl,alt:"About"}));
  else aImg.appendChild(document.createTextNode(cfg.aboutEmoji||"✨"));
  ai.appendChild(aImg);
  const aTxt=div({});
  aTxt.appendChild(p({className:"sec-label"},"БИДНИЙ ТУХАЙ"));
  aTxt.appendChild(h2({className:"serif",style:{fontSize:"clamp(24px,4vw,36px)",fontWeight:"400",lineHeight:"1.2",marginBottom:"18px"}},cfg.aboutTitle||"Бидний тухай"));
  aTxt.appendChild(p({style:{fontSize:"15px",color:"var(--muted)",lineHeight:"1.9",marginBottom:"28px"}},cfg.aboutText||""));
  aTxt.appendChild(btn({style:{background:"var(--dark)",color:"#fff",border:"none",borderRadius:"12px",padding:"13px 30px",fontSize:"14px",fontWeight:"600"},onClick:()=>setState({page:"book",step:1,selService:null,selSub:null,time:""})},"Цаг захиалах"));
  ai.appendChild(aTxt);
  secA.appendChild(ai);
  wrap.appendChild(secA);

  // Info
  const secI=div({className:"section",style:{paddingTop:"60px",paddingBottom:"60px"}});
  const ig=div({style:{maxWidth:"860px",margin:"0 auto",display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))",gap:"14px"}});
  [{icon:"📍",label:"Хаяг",val:cfg.address},{icon:"📞",label:"Утас",val:cfg.phone},{icon:"🕙",label:"Цагийн хуваарь",val:`${cfg.firstSlot||"10:00"} – ${cfg.lastSlot||"20:00"}`}].forEach(it=>{
    const c=div({style:{background:"#fff",borderRadius:"18px",padding:"22px",border:"1px solid var(--border)",boxShadow:"0 2px 10px rgba(0,0,0,.04)"}});
    c.appendChild(div({style:{fontSize:"22px",marginBottom:"8px"}},it.icon));
    c.appendChild(p({style:{fontSize:"10px",fontWeight:"700",letterSpacing:"1.5px",textTransform:"uppercase",color:"var(--pink2)",marginBottom:"4px"}},it.label));
    c.appendChild(p({style:{fontSize:"14px",color:"var(--text)",lineHeight:"1.6"}},it.val));
    ig.appendChild(c);
  });
  secI.appendChild(ig);
  wrap.appendChild(secI);

  // Footer
  const foot=el("footer");
  const fi=div({className:"foot-inner"});
  const ft=div({className:"foot-top"});
  const fb=div({});
  const fn=p({}); fn.innerHTML=`<span class="serif" style="font-size:22px;color:#fff">${cfg.studioName||"Glow Studio"}</span>`;
  fb.appendChild(fn);
  const fa=p({style:{fontSize:"13px",marginTop:"6px",lineHeight:"1.8"}});
  fa.innerHTML=cfg.phone+"<br>"+cfg.address;
  fb.appendChild(fa);
  ft.appendChild(fb);
  const hasSoc=cfg.instagram||cfg.facebook||cfg.tiktok;
  if(hasSoc){
    const sd=div({className:"foot-links"});
    sd.appendChild(p({style:{fontSize:"11px",fontWeight:"700",letterSpacing:"1.5px",textTransform:"uppercase",color:"#4a3540",marginBottom:"8px"}},"СОШИАЛ МЕДИА"));
    if(cfg.instagram){ const a=el("a",{href:cfg.instagram.startsWith("http")?cfg.instagram:"https://instagram.com/"+cfg.instagram.replace("@",""),target:"_blank"}); a.textContent="📸 Instagram"; sd.appendChild(a); }
    if(cfg.facebook){ const a=el("a",{href:cfg.facebook.startsWith("http")?cfg.facebook:"https://facebook.com/"+cfg.facebook,target:"_blank"}); a.textContent="👍 Facebook"; sd.appendChild(a); }
    if(cfg.tiktok){ const a=el("a",{href:cfg.tiktok.startsWith("http")?cfg.tiktok:"https://tiktok.com/@"+cfg.tiktok.replace("@",""),target:"_blank"}); a.textContent="🎵 TikTok"; sd.appendChild(a); }
    ft.appendChild(sd);
  }
  fi.appendChild(ft);
  fi.appendChild(p({style:{fontSize:"12px",color:"#4a3540",textAlign:"center"}},`© 2026 ${cfg.studioName||"Glow Studio"}. Бүх эрх хуулиар хамгаалагдсан.`));
  foot.appendChild(fi);
  wrap.appendChild(foot);
  return wrap;
}

// ── BOOK ──────────────────────────────────────────
function BookPage(){
  const cfg=S.settings;
  const svcs=S.services.length>0?S.services:DEF_SERVICES;
  const slots=genSlots(cfg);
  const wrap=div({});
  wrap.appendChild(Nav("book"));
  const inner=div({className:"book-wrap"});

  // Stepper
  const steps=["Үйлчилгээ","Дэд төрөл","Цаг","Мэдээлэл"];
  const stpr=div({className:"stepper"});
  steps.forEach((s,i)=>{
    stpr.appendChild(div({className:"step-dot",style:{background:S.step>i+1?"var(--dark)":S.step===i+1?"var(--pink2)":"#f0e4ec",color:S.step>=i+1?"#fff":"#ccc"}},S.step>i+1?"✓":String(i+1)));
    stpr.appendChild(span({style:{marginLeft:"6px",fontSize:"12px",fontWeight:"500",whiteSpace:"nowrap",color:S.step===i+1?"var(--dark)":"#bbb"}},s));
    if(i<steps.length-1) stpr.appendChild(div({className:"step-line",style:{background:S.step>i+1?"var(--dark)":"var(--border)"}}));
  });
  inner.appendChild(stpr);

  const isHol=S.holidays.includes(S.date);

  // ── STEP 1: Үйлчилгээ сонгох ──
  if(S.step===1){
    inner.appendChild(h2({className:"serif f1",style:{fontSize:"30px",marginBottom:"8px"}},"Үйлчилгээ сонгоно уу"));
    inner.appendChild(p({style:{color:"var(--muted)",marginBottom:"24px",fontSize:"14px"}},"Авахыг хүсэж буй үйлчилгээгээ сонгоно уу"));
    const sg=div({style:{display:"flex",flexDirection:"column",gap:"10px"}});
    svcs.forEach(svc=>{
      const sel=S.selService?.id===svc.id;
      const card=btn({style:{border:"2px solid "+(sel?"var(--pink2)":"var(--border)"),borderRadius:"16px",padding:"0",background:sel?"#fdf0f7":"#fff",display:"flex",alignItems:"center",textAlign:"left",width:"100%",overflow:"hidden",boxShadow:sel?"0 0 0 3px rgba(212,114,159,.13)":"none",transition:"all .15s"}});
      if(svc.imageUrl) card.appendChild(el("img",{src:svc.imageUrl,alt:svc.name,style:{width:"80px",height:"80px",objectFit:"cover",flexShrink:"0"}}));
      else card.appendChild(div({style:{width:"80px",height:"80px",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"28px",background:"linear-gradient(135deg,#fdf0f7,#f5e8f2)",flexShrink:"0"}},svc.emoji||"💄"));
      const bd=div({style:{flex:"1",padding:"13px 16px"}});
      bd.appendChild(p({style:{fontWeight:"700",fontSize:"15px",color:"var(--dark)",marginBottom:"2px"}},svc.name));
      const subs=svc.subs||[];
      if(subs.length>0){
        const priceRange=`${fmt(Math.min(...subs.map(s=>s.price)))} – ${fmt(Math.max(...subs.map(s=>s.price)))}`;
        bd.appendChild(p({style:{fontSize:"12px",color:"var(--pink3)",fontWeight:"600"}},priceRange));
      }
      bd.appendChild(p({style:{fontSize:"12px",color:"var(--muted)",marginTop:"2px"}},svc.desc||""));
      card.appendChild(bd);
      if(sel) card.appendChild(span({style:{paddingRight:"16px",fontSize:"18px",color:"var(--pink2)"}},"✓"));
      card.addEventListener("click",()=>{ S.selService=svc; S.selSub=null; render(); });
      sg.appendChild(card);
    });
    inner.appendChild(sg);
    inner.appendChild(div({style:{marginTop:"20px"}},[
      btn({style:{width:"100%",background:S.selService?"var(--dark)":"#e5e7eb",color:S.selService?"#fff":"#9ca3af",border:"none",borderRadius:"13px",padding:"14px 0",fontSize:"15px",fontWeight:"600"},onClick:()=>{ if(S.selService) setState({step:2}); }},"Үргэлжлүүлэх →")
    ]));
  }

  // ── STEP 2: Дэд төрөл сонгох ──
  else if(S.step===2){
    inner.appendChild(btn({style:{background:"none",border:"none",color:"var(--muted)",fontSize:"13px",marginBottom:"18px",display:"flex",alignItems:"center",gap:"5px"},onClick:()=>setState({step:1})},"← Буцах"));
    inner.appendChild(h2({className:"serif f1",style:{fontSize:"30px",marginBottom:"8px"}},"Төрөл сонгоно уу"));
    inner.appendChild(p({style:{color:"var(--muted)",marginBottom:"24px",fontSize:"14px"}},[
      span({style:{background:"#f7f0f5",color:"var(--pink3)",borderRadius:"8px",padding:"3px 10px",fontSize:"13px",fontWeight:"600"}},S.selService?.name||""), " — дэд төрлийг сонгоно уу"
    ]));
    const subs=S.selService?.subs||[];
    const sg=div({style:{display:"flex",flexDirection:"column",gap:"10px"}});
    subs.forEach(sub=>{
      const sel=S.selSub?.id===sub.id;
      const card=btn({style:{border:"2px solid "+(sel?"var(--pink2)":"var(--border)"),borderRadius:"14px",padding:"16px 20px",background:sel?"#fdf0f7":"#fff",display:"flex",alignItems:"center",justifyContent:"space-between",width:"100%",textAlign:"left",transition:"all .15s"}});
      const left2=div({});
      left2.appendChild(p({style:{fontWeight:"700",fontSize:"15px",color:"var(--dark)",marginBottom:"2px"}},sub.name));
      left2.appendChild(p({style:{fontSize:"12px",color:"var(--muted)"}},`${cfg.serviceDuration||90} минут`));
      card.appendChild(left2);
      const right2=div({style:{display:"flex",alignItems:"center",gap:"10px"}});
      right2.appendChild(span({style:{fontSize:"18px",fontWeight:"700",color:"var(--pink3)"}},fmt(sub.price)));
      if(sel) right2.appendChild(span({style:{fontSize:"16px",color:"var(--pink2)"}},"✓"));
      card.appendChild(right2);
      card.addEventListener("click",()=>{ S.selSub=sub; render(); });
      sg.appendChild(card);
    });
    inner.appendChild(sg);
    inner.appendChild(div({style:{marginTop:"20px"}},[
      btn({style:{width:"100%",background:S.selSub?"var(--dark)":"#e5e7eb",color:S.selSub?"#fff":"#9ca3af",border:"none",borderRadius:"13px",padding:"14px 0",fontSize:"15px",fontWeight:"600"},onClick:()=>{ if(S.selSub) setState({step:3}); }},"Үргэлжлүүлэх →")
    ]));
  }

  // ── STEP 3: Өдөр + цаг ──
  else if(S.step===3){
    inner.appendChild(btn({style:{background:"none",border:"none",color:"var(--muted)",fontSize:"13px",marginBottom:"18px",display:"flex",alignItems:"center",gap:"5px"},onClick:()=>setState({step:2})},"← Буцах"));
    inner.appendChild(h2({className:"serif f1",style:{fontSize:"30px",marginBottom:"8px"}},"Өдөр, цаг сонгоно уу"));
    inner.appendChild(p({style:{color:"var(--muted)",marginBottom:"24px",fontSize:"14px"}},[
      span({style:{background:"#f7f0f5",color:"var(--pink3)",borderRadius:"8px",padding:"3px 10px",fontSize:"13px",fontWeight:"600"}},S.selService?.name+" – "+S.selSub?.name)
    ]));
    inner.appendChild(lbl({className:"lbl"},"Өдөр"));
    const di=inp({type:"date",value:S.date,min:today(),style:{marginBottom:"22px"}});
    di.addEventListener("change",e=>{ S.date=e.target.value; S.time=""; render(); });
    inner.appendChild(di);

    if(isHol){
      inner.appendChild(div({style:{background:"#fef3c7",border:"1px solid #fcd34d",borderRadius:"12px",padding:"14px 18px",fontSize:"13px",color:"#92400e"}},"⚠️ Энэ өдөр амралтын өдөр тул захиалга авахгүй."));
    } else {
      inner.appendChild(lbl({className:"lbl",style:{marginBottom:"12px"}},"Цаг сонгоно уу"));
      const tg=div({className:"slot-grid"});
      slots.forEach(t=>{
        const info=getSlotInfo(S.date,t,S.selService.id,cfg,S.bookings);
        const sel=S.time===t;
        let cls="slot-btn";
        if(sel) cls+=" sel";
        else if(info.full) cls+=" full";
        else if(info.used>0) cls+=" partial";
        const tb=el("button",{className:cls});
        tb.disabled=info.full;
        tb.appendChild(p({style:{fontWeight:"700",fontSize:"15px"}},t));
        const statusTxt = info.full ? "Дүүрсэн" : info.cap>1 ? `${info.left}/${info.cap} боломжтой` : "Боломжтой";
        tb.appendChild(p({style:{fontSize:"11px",marginTop:"3px",color:sel?"rgba(255,255,255,.7)":info.full?"#ccc":info.used>0?"#d97706":"var(--muted)"}},statusTxt));
        tb.addEventListener("click",()=>{ S.time=t; render(); });
        tg.appendChild(tb);
      });
      inner.appendChild(tg);

      // Мэдэгдэл: хугацааны тайлбар
      const dur=cfg.serviceDuration||90;
      inner.appendChild(div({style:{background:"#f0f9ff",border:"1px solid #bae6fd",borderRadius:"10px",padding:"10px 14px",fontSize:"12px",color:"#0369a1",marginBottom:"20px"}},
        `ℹ️ ${S.selService?.name} үйлчилгээ ${dur} минут үргэлжилнэ. Сонгосон цагаас хойш ${dur} минутын хуваарь эзлэгдэнэ.`
      ));

      inner.appendChild(btn({style:{width:"100%",background:S.time?"var(--dark)":"#e5e7eb",color:S.time?"#fff":"#9ca3af",border:"none",borderRadius:"13px",padding:"14px 0",fontSize:"15px",fontWeight:"600"},onClick:()=>{ if(S.time) setState({step:4}); }},"Үргэлжлүүлэх →"));
    }
  }

  // ── STEP 4: Мэдээлэл ──
  else if(S.step===4){
    inner.appendChild(btn({style:{background:"none",border:"none",color:"var(--muted)",fontSize:"13px",marginBottom:"18px",display:"flex",alignItems:"center",gap:"5px"},onClick:()=>setState({step:3})},"← Буцах"));
    inner.appendChild(h2({className:"serif f1",style:{fontSize:"30px",marginBottom:"8px"}},"Мэдээлэл оруулна уу"));
    inner.appendChild(p({style:{color:"var(--muted)",marginBottom:"22px",fontSize:"14px"}},[
      span({style:{background:"#f7f0f5",color:"var(--pink3)",borderRadius:"8px",padding:"3px 10px",fontSize:"13px",fontWeight:"600"}},S.selService?.name+" – "+S.selSub?.name),
      " · "+S.date+" · "+S.time
    ]));
    [{key:"name",label:"Нэр",ph:"Таны нэр",type:"text"},{key:"phone",label:"Утас",ph:"9900-0000",type:"tel"},{key:"email",label:"И-мэйл",ph:"email@example.com",type:"email"}].forEach(f=>{
      const fw=div({style:{marginBottom:"16px"}});
      fw.appendChild(lbl({className:"lbl"},f.label));
      const fi=inp({type:f.type,placeholder:f.ph,value:S.form[f.key]});
      fi.style.borderColor=S.errors[f.key]?"#f87171":"var(--border)";
      fi.addEventListener("input",e=>{ S.form[f.key]=e.target.value; });
      fw.appendChild(fi);
      if(S.errors[f.key]) fw.appendChild(p({style:{fontSize:"12px",color:"#ef4444",marginTop:"4px"}},S.errors[f.key]));
      inner.appendChild(fw);
    });
    // Summary
    const sum=div({style:{background:"#fdf4ff",border:"1px solid #e9d5ff",borderRadius:"14px",padding:"18px",marginBottom:"22px"}});
    sum.appendChild(p({style:{fontSize:"11px",fontWeight:"700",color:"var(--pink3)",marginBottom:"10px",letterSpacing:"1px"}},"📋 ЗАХИАЛГЫН ДЭЛГЭРЭНГҮЙ"));
    [["Үйлчилгээ",S.selService?.name],["Дэд төрөл",S.selSub?.name],["Хугацаа",(cfg.serviceDuration||90)+" минут"],["Өдөр",S.date],["Цаг",S.time],["Үнэ",fmt(S.selSub?.price||0)]].forEach(row=>{
      const r=div({style:{display:"flex",justifyContent:"space-between",fontSize:"13px",marginBottom:"6px"}});
      r.appendChild(span({style:{color:"var(--muted)"}},row[0]));
      r.appendChild(span({style:{fontWeight:"600",color:"var(--dark)"}},row[1]||""));
      sum.appendChild(r);
    });
    inner.appendChild(sum);
    const sb=btn({style:{width:"100%",background:S.loading?"#bbb":"var(--pink2)",color:"#fff",border:"none",borderRadius:"13px",padding:"16px 0",fontWeight:"700",fontSize:"15px",boxShadow:"0 4px 18px rgba(212,114,159,.35)"}},S.loading?"Илгээж байна...":"Захиалга илгээх ✦");
    sb.disabled=S.loading;
    sb.addEventListener("click",async()=>{
      const e={};
      if(!S.form.name.trim()) e.name="Нэр оруулна уу";
      if(!/^\d{7,8}/.test(S.form.phone.replace(/[\s\-]/g,""))) e.phone="Утасны дугаар буруу";
      if(!S.form.email.includes("@")) e.email="Зөв и-мэйл оруулна уу";
      if(Object.keys(e).length){ setState({errors:e}); return; }
      setState({loading:true});
      const b={
        name:S.form.name, phone:S.form.phone, email:S.form.email,
        date:S.date, time:S.time,
        serviceId:S.selService.id, serviceName:S.selService.name,
        subId:S.selSub.id, subName:S.selSub.name,
        price:S.selSub.price,
        duration:cfg.serviceDuration||90,
        id:uid(), status:"pending", createdAt:new Date().toISOString()
      };
      const saved=await DB.addBooking(b);
      setState({lastBook:saved,page:"success",step:1,form:{name:"",phone:"",email:""},errors:{},time:"",selService:null,selSub:null,loading:false});
    });
    inner.appendChild(sb);
  }

  wrap.appendChild(inner);
  return wrap;
}

// ── SUCCESS ───────────────────────────────────────
function SuccessPage(){
  const b=S.lastBook, cfg=S.settings;

function showServiceModal(svc){

  const ov=div({className:"modal-overlay"});
  const m=div({className:"modal",style:{maxWidth:"520px"}});
  // Header
  const hd=div({style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"20px"}});
  hd.appendChild(h3({style:{fontSize:"17px",fontWeight:"700"}},isNew?"+ Шинэ үйлчилгээ":"✏️ Үйлчилгээ засах"));
  const cl=btn({style:{background:"none",border:"none",fontSize:"20px",cursor:"pointer",color:"#999"}},"✕"); cl.addEventListener("click",()=>ov.remove()); hd.appendChild(cl); m.appendChild(hd);

  // Зураг
  const imgSec=div({style:{marginBottom:"16px"}});
  if(data.imageUrl) imgSec.appendChild(el("img",{src:data.imageUrl,alt:"",style:{width:"100%",height:"140px",objectFit:"cover",borderRadius:"12px",display:"block",marginBottom:"8px"}}));
  const ua=div({className:"upload-area"});

  const ufi=inp({type:"file",accept:"image/*"}); ua.appendChild(ufi); ua.addEventListener("click",()=>ufi.click());
  ufi.addEventListener("change",async e=>{ const f=e.target.files[0]; if(!f) return; ua.innerHTML=`<div>⏳</div>`; try{ data.imageUrl=await compressImage(f); ua.innerHTML=`<div style="color:#10b981;font-size:13px">✅ Амжилттай</div>`; }catch(err){ ua.innerHTML=`<div style="color:#ef4444;font-size:13px">❌ Алдаа</div>`; } });
  imgSec.appendChild(ua); m.appendChild(imgSec);

  // Үндсэн мэдээлэл
  const row1=div({className:"row2 mb12"});
  [{key:"name",label:"Нэр",ph:"Сормуус",type:"text"},{key:"emoji",label:"Emoji",ph:"👁️",type:"text"}].forEach(f=>{
    const fw=div({}); fw.appendChild(lbl({className:"lbl"},f.label));
    const fi=inp({type:f.type,placeholder:f.ph,value:String(data[f.key]||"")});
    fi.addEventListener("input",e=>{ data[f.key]=e.target.value; }); fw.appendChild(fi); row1.appendChild(fw);
  });
  m.appendChild(row1);

  const row2=div({className:"row2 mb12"});
  [{key:"capacity",label:"Зэрэг хүлээж авах тоо",ph:"1",type:"number"},{key:"order",label:"Эрэмбэ",ph:"0",type:"number"}].forEach(f=>{
    const fw=div({}); fw.appendChild(lbl({className:"lbl"},f.label));
    const fi=inp({type:"number",min:"1",placeholder:f.ph,value:String(data[f.key]||"")});
    fi.addEventListener("input",e=>{ data[f.key]=parseInt(e.target.value)||1; }); fw.appendChild(fi); row2.appendChild(fw);
  });
  m.appendChild(row2);

  m.appendChild(lbl({className:"lbl"},"Тайлбар"));
  const ta=el("textarea",{placeholder:"Үйлчилгээний товч тайлбар...",style:{minHeight:"60px",resize:"vertical",marginBottom:"18px"}});
  ta.value=data.desc||""; ta.addEventListener("input",e=>{ data.desc=e.target.value; }); m.appendChild(ta);

  // Дэд төрлүүд
  m.appendChild(div({style:{height:"1px",background:"var(--border)",marginBottom:"16px"}}));
  const subHeader=div({style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px"}});
  subHeader.appendChild(p({style:{fontWeight:"700",fontSize:"14px"}},"Дэд төрлүүд (үнэ)"));
  const addSubBtn=btn({style:{background:"var(--pink3)",color:"#fff",border:"none",borderRadius:"8px",padding:"5px 12px",fontSize:"12px",fontWeight:"600"}},"+ Нэмэх");
  subHeader.appendChild(addSubBtn); m.appendChild(subHeader);

  const subList=div({style:{display:"flex",flexDirection:"column",gap:"8px",marginBottom:"16px"}});

  function renderSubs(){
    subList.innerHTML="";
    (data.subs||[]).forEach((sub,idx)=>{
      const row=div({style:{display:"grid",gridTemplateColumns:"1fr 1fr auto",gap:"8px",alignItems:"center"}});
      const ni=inp({type:"text",placeholder:"Нэр (жишээ: Classic)",value:sub.name,style:{padding:"9px 12px"}});
      ni.addEventListener("input",e=>{ data.subs[idx].name=e.target.value; });
      const pi=inp({type:"number",placeholder:"Үнэ",value:String(sub.price||""),style:{padding:"9px 12px"}});
      pi.addEventListener("input",e=>{ data.subs[idx].price=parseInt(e.target.value)||0; });
      const db4=btn({style:{background:"#fef2f2",color:"#ef4444",border:"1px solid #fecaca",borderRadius:"8px",padding:"8px 10px",fontSize:"13px"}},"✕");
      (function(i){ db4.addEventListener("click",()=>{ data.subs.splice(i,1); renderSubs(); }); })(idx);
      row.appendChild(ni); row.appendChild(pi); row.appendChild(db4);
      subList.appendChild(row);
    });
  }
  renderSubs();
  addSubBtn.addEventListener("click",()=>{ if(!data.subs) data.subs=[]; data.subs.push({id:"sub"+Date.now(),name:"",price:0}); renderSubs(); });
  m.appendChild(subList);

  // Хадгалах
  const sb=btn({style:{width:"100%",background:"var(--dark)",color:"#fff",border:"none",borderRadius:"12px",padding:"13px 0",fontWeight:"600",fontSize:"14px"}},"💾 Хадгалах");
  sb.addEventListener("click",async()=>{
    if(!data.name.trim()){ showToast("Нэр оруулна уу"); return; }

    sb.textContent="⏳ Хадгалж байна..."; sb.disabled=true;
    const saved=await DB.saveService(data);
    const idx=S.services.findIndex(s=>s.id===data.id);
    if(idx>=0) S.services[idx]={...S.services[idx],...saved};
    else S.services.push(saved);
    showToast("Хадгалагдлаа ✓"); ov.remove(); render();
  });
  m.appendChild(sb);
  ov.addEventListener("click",e=>{ if(e.target===ov) ov.remove(); });
  ov.appendChild(m); document.body.appendChild(ov);
}

      const ov2=div({style:{position:"absolute",inset:"0",background:"rgba(28,18,24,.55)",opacity:"0",transition:"opacity .2s",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:"4px",padding:"8px"}});
      if(item.caption) ov2.appendChild(span({style:{color:"#fff",fontSize:"11px",textAlign:"center"}},item.caption));
      const db5=btn({style:{background:"#ef4444",color:"#fff",border:"none",borderRadius:"7px",padding:"4px 10px",fontSize:"11px",fontWeight:"700"}},"🗑️");
      (function(it){ db5.addEventListener("click",async e=>{ e.stopPropagation(); if(!confirm("Устгах уу?")) return; await DB.deleteGallery(it._docId); showToast("Устгагдлаа"); }); })(item);
      ov2.appendChild(db5); gi.appendChild(ov2);
      gi.addEventListener("mouseenter",()=>ov2.style.opacity="1"); gi.addEventListener("mouseleave",()=>ov2.style.opacity="0");
      gg.appendChild(gi);
    });
    gc.appendChild(gg);
  }
  wrap.appendChild(gc);
  return wrap;
}

// ── ADMIN: Settings tab ───────────────────────────
function buildSettingsTab(){
  const cfg={...S.settings};
  const wrap=div({style:{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(300px,1fr))",gap:"16px"}});

  function settingCard(title,fields){
    const c=div({className:"card"});
    c.appendChild(h3({style:{fontSize:"15px",fontWeight:"700",marginBottom:"16px"}},title));
    fields.forEach(f=>{
      const fw=div({style:{marginBottom:"12px"}});
      fw.appendChild(lbl({className:"lbl"},f.label));
      if(f.type==="textarea"){ const ta=el("textarea",{placeholder:f.ph,style:{minHeight:"75px",resize:"vertical"}}); ta.value=cfg[f.key]||""; ta.addEventListener("input",e=>{ cfg[f.key]=e.target.value; }); fw.appendChild(ta); }
      else { const fi=inp({type:f.type||"text",placeholder:f.ph,value:String(cfg[f.key]||"")}); fi.addEventListener("input",e=>{ cfg[f.key]=f.type==="number"?parseInt(e.target.value)||0:e.target.value; }); fw.appendChild(fi); }
      c.appendChild(fw);
    });
    const sb=btn({style:{width:"100%",background:"var(--dark)",color:"#fff",border:"none",borderRadius:"10px",padding:"11px",fontWeight:"600",fontSize:"14px",marginTop:"4px"}},"💾 Хадгалах");
    sb.addEventListener("click",async()=>{ sb.textContent="⏳..."; sb.disabled=true; await DB.saveSettings(cfg); S.settings={...cfg}; sb.textContent="✓ Хадгалагдлаа!"; sb.style.background="#10b981"; setTimeout(()=>{ sb.textContent="💾 Хадгалах"; sb.style.background="var(--dark)"; sb.disabled=false; },2000); showToast("Хадгалагдлаа ✓"); });
    c.appendChild(sb);
    return c;
  }

  wrap.appendChild(settingCard("🏠 Студийн мэдээлэл",[{key:"studioName",label:"Нэр",ph:"Glow Studio"},{key:"tagline",label:"Уриа үг (hero гарчиг)",ph:"Өөрийгөө <em>илэрхийлэх</em> газар"},{key:"phone",label:"Утас",ph:"9900-0000"},{key:"address",label:"Хаяг",ph:"УБ хот"}]));
  wrap.appendChild(settingCard("⏰ Цагийн тохиргоо",[{key:"serviceDuration",label:"Үйлчилгээний хугацаа (мин) — бүх үйлчилгээнд адилхан",ph:"90",type:"number"},{key:"slotDuration",label:"Slot хоорондын зай (мин) — ихэвчлэн адилхан",ph:"90",type:"number"},{key:"firstSlot",label:"Эхний цаг",ph:"10:00"},{key:"lastSlot",label:"Сүүлийн эхлэх цаг",ph:"20:00"}]));
  wrap.appendChild(settingCard("💳 Банкны мэдээлэл",[{key:"bank",label:"Банк",ph:"Хаан банк"},{key:"account",label:"Данс",ph:"1234567890"}]));
  wrap.appendChild(settingCard("📱 Сошиал медиа",[{key:"instagram",label:"Instagram",ph:"@glowstudio"},{key:"facebook",label:"Facebook",ph:"facebook.com/glowstudio"},{key:"tiktok",label:"TikTok",ph:"@glowstudio"}]));
  wrap.appendChild(settingCard("ℹ️ Бидний тухай",[{key:"aboutEmoji",label:"Emoji",ph:"✨"},{key:"aboutTitle",label:"Гарчиг",ph:"Бидний тухай"},{key:"aboutText",label:"Тайлбар",ph:"Студийн тухай...",type:"textarea"}]));

  // About image
  const aCard=div({className:"card"});
  aCard.appendChild(h3({style:{fontSize:"15px",fontWeight:"700",marginBottom:"14px"}},"🖼️ About хэсгийн зураг"));
  if(cfg.aboutImageUrl) aCard.appendChild(el("img",{src:cfg.aboutImageUrl,alt:"",style:{width:"100%",height:"150px",objectFit:"cover",borderRadius:"12px",marginBottom:"8px",display:"block"}}));
  const aUa=div({className:"upload-area"}); aUa.innerHTML=`<div style="font-size:22px;margin-bottom:4px">📸</div><p style="font-size:13px;color:#888">About зураг оруулах</p>`;
  const aUfi=inp({type:"file",accept:"image/*"}); aUa.appendChild(aUfi); aUa.addEventListener("click",()=>aUfi.click());
  aUfi.addEventListener("change",async e=>{ const f=e.target.files[0]; if(!f) return; aUa.innerHTML=`<div>⏳</div>`; try{ cfg.aboutImageUrl=await compressImage(f,1200,0.82); await DB.saveSettings(cfg); S.settings={...cfg}; showToast("Зураг хадгалагдлаа ✓"); render(); }catch(e){ aUa.innerHTML=`<p style="font-size:12px;color:#ef4444">❌ Алдаа</p>`; } });
  aCard.appendChild(aUa); wrap.appendChild(aCard);
  return wrap;
}

// ── ADMIN: Calendar tab ───────────────────────────
function buildCalendarTab(){
  const cfg=S.settings;
  const slots=genSlots(cfg);
  const svcs=S.services.length>0?S.services:DEF_SERVICES;
  const wrap=div({});
  wrap.appendChild(h2({className:"serif",style:{fontSize:"24px",marginBottom:"6px"}},"Хуваарь"));
  wrap.appendChild(p({style:{color:"var(--muted)",fontSize:"13px",marginBottom:"24px"}},"Амралтын өдрүүд болон өдрийн захиалгуудыг харах"));
  const g=div({style:{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(300px,1fr))",gap:"18px"}});

  // Амралтын өдрүүд
  const hCard=div({className:"card"});
  hCard.appendChild(h3({style:{fontSize:"15px",fontWeight:"700",marginBottom:"12px"}},"🛑 Амралтын өдрүүд"));
  const hr2=div({style:{display:"flex",gap:"7px",marginBottom:"12px"}}); const hI=inp({type:"date",style:{flex:"1"}}); hr2.appendChild(hI);
  const addHB=btn({style:{background:"var(--dark)",color:"#fff",border:"none",borderRadius:"9px",padding:"0 14px",fontWeight:"600",fontSize:"13px",whiteSpace:"nowrap"}},"+ Нэмэх");
  addHB.addEventListener("click",async()=>{ const v=hI.value; if(v&&!S.holidays.includes(v)){ await DB.addHoliday(v); hI.value=""; showToast("Нэмэгдлаа"); } }); hr2.appendChild(addHB); hCard.appendChild(hr2);
  if(S.holidays.length===0){ hCard.appendChild(p({style:{color:"#ccc",fontSize:"13px"}},"Амралтын өдөр байхгүй")); }
  else { const hl=div({style:{display:"flex",flexWrap:"wrap",gap:"7px"}}); S.holidays.forEach(hd=>{ const c=div({style:{background:"#fff7ed",border:"1px solid #fed7aa",borderRadius:"8px",padding:"5px 10px",display:"flex",alignItems:"center",gap:"6px",fontSize:"13px"}}); c.appendChild(span({},"📅 "+hd)); const rb=btn({style:{background:"#fee2e2",color:"#ef4444",border:"none",borderRadius:"4px",padding:"1px 7px",fontSize:"12px",fontWeight:"700"}},"✕"); (function(d){ rb.addEventListener("click",async()=>{ await DB.removeHoliday(d); showToast("Устгагдлаа"); }); })(hd); c.appendChild(rb); hl.appendChild(c); }); hCard.appendChild(hl); }
  g.appendChild(hCard);

  // Өдрийн байдал — үйлчилгээ тус бүрээр
  const sCard=div({className:"card"});
  sCard.appendChild(h3({style:{fontSize:"15px",fontWeight:"700",marginBottom:"12px"}},"📊 Өдрийн захиалгын байдал"));
  const sI=inp({type:"date",value:S.schedDate,style:{marginBottom:"14px"}});
  sI.addEventListener("change",e=>setState({schedDate:e.target.value})); sCard.appendChild(sI);
  if(S.holidays.includes(S.schedDate)){ sCard.appendChild(div({style:{background:"#fef3c7",border:"1px solid #fcd34d",borderRadius:"10px",padding:"12px",fontSize:"13px",color:"#92400e"}},"⚠️ Амралтын өдөр")); }
  else {
    svcs.forEach(svc=>{
      const cap=svc.capacity||1;
      const secDiv=div({style:{marginBottom:"16px"}});
      secDiv.appendChild(p({style:{fontWeight:"700",fontSize:"13px",marginBottom:"8px",color:"var(--pink3)"}},[svc.emoji||"","  ",svc.name,span({style:{fontSize:"11px",color:"var(--muted)",fontWeight:"400",marginLeft:"6px"}},"("+cap+" зэрэг)")]));
      const sg=div({style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(90px,1fr))",gap:"6px"}});
      slots.forEach(t=>{
        const info=getSlotInfo(S.schedDate,t,svc.id,cfg,S.bookings);
        const sc2=div({style:{border:"1px solid var(--border)",borderRadius:"10px",padding:"8px 6px",background:info.full?"#fff5f5":info.used>0?"#fffbeb":"#fff",textAlign:"center"}});
        sc2.appendChild(p({style:{fontWeight:"700",fontSize:"13px",marginBottom:"2px"}},t));
        sc2.appendChild(p({style:{fontSize:"10px",fontWeight:"700",color:info.full?"#ef4444":info.used>0?"#d97706":"#10b981"}},info.full?"Дүүрсэн":info.used+"/"+cap));
        // Захиалагчдын нэр
        const bks=S.bookings.filter(b=>b.date===S.schedDate&&b.time===t&&b.serviceId===svc.id&&b.status!=="cancelled");
        bks.forEach(b=>sc2.appendChild(p({style:{fontSize:"9px",color:"#999",marginTop:"2px"}},"• "+b.name+(b.subName?" ("+b.subName+")":""))));
        sg.appendChild(sc2);
      });
      secDiv.appendChild(sg);
      sCard.appendChild(secDiv);
    });
  }
  g.appendChild(sCard);
  wrap.appendChild(g);
  return wrap;
}

// ── ADMIN PAGE ────────────────────────────────────
function AdminPage(){
  if(!S.adminAuthed) return AdminLoginPage();
  const cfg=S.settings;
  const wrap=div({style:{minHeight:"100vh",background:"#f5f3f4"}});
  const bar=div({className:"admin-bar"});
  const left=div({style:{display:"flex",alignItems:"center",gap:"10px"}});
  left.appendChild(span({style:{fontSize:"14px"}},"✨"));
  left.appendChild(span({className:"serif",style:{fontSize:"17px",fontWeight:"500",color:"#fff"}},cfg.studioName||"Glow Studio"));
  left.appendChild(span({style:{fontSize:"11px",background:"rgba(255,255,255,.1)",borderRadius:"6px",padding:"2px 8px",color:"#888"}},cfg.adminEmail));
  const right=div({style:{display:"flex",gap:"2px",alignItems:"center",flexWrap:"wrap"}});
  [["bookings","📋 Захиалга"],["services","✂️ Үйлчилгээ"],["gallery","🖼️ Галерей"],["settings","⚙️ Тохиргоо"],["calendar","📅 Хуваарь"]].forEach(item=>{
    const tb=btn({className:"atab"+(S.adminTab===item[0]?" on":"")},item[1]);
    tb.addEventListener("click",()=>setState({adminTab:item[0]})); right.appendChild(tb);
  });
  const out=btn({style:{background:"none",border:"1px solid #333",color:"#777",borderRadius:"8px",padding:"5px 11px",fontSize:"12px",marginLeft:"8px"}},"Гарах");
  out.addEventListener("click",()=>{ localStorage.removeItem("gw:auth"); setState({adminAuthed:false}); }); right.appendChild(out);
  bar.appendChild(left); bar.appendChild(right); wrap.appendChild(bar);

  const inner=div({style:{maxWidth:"1100px",margin:"0 auto",padding:"24px clamp(12px,3vw,24px)"}});
  if(S.adminTab==="bookings"){
    const sw=div({id:"asc"}); sw.appendChild(buildStats()); inner.appendChild(sw);
    const tw=div({id:"atc"}); tw.appendChild(buildBookingTable()); inner.appendChild(tw);
  } else if(S.adminTab==="services"){ inner.appendChild(buildServicesTab());
  } else if(S.adminTab==="gallery"){ inner.appendChild(buildGalleryTab());
  } else if(S.adminTab==="settings"){
    inner.appendChild(h2({className:"serif",style:{fontSize:"24px",marginBottom:"6px"}},"Тохиргоо"));
    inner.appendChild(p({style:{color:"var(--muted)",fontSize:"13px",marginBottom:"20px"}},"Студийн бүх мэдээллийг энд удирдана уу"));
    inner.appendChild(buildSettingsTab());
  } else if(S.adminTab==="calendar"){ inner.appendChild(buildCalendarTab()); }
  wrap.appendChild(inner);
  return wrap;
}

// ── RENDER ────────────────────────────────────────
function render(){
  const app=document.getElementById("app");
  app.innerHTML="";
  let page;
  if(S.page==="home") page=HomePage();
  else if(S.page==="book") page=BookPage();
  else if(S.page==="success") page=SuccessPage();
  else if(S.page==="admin") page=AdminPage();
  else page=HomePage();
  app.appendChild(page);
  window.scrollTo(0,0);
}

// ── INIT ──────────────────────────────────────────
async function init(){
  const [bookings,holidays,settings,services,gallery]=await Promise.all([
    DB.loadBookings(),DB.loadHolidays(),DB.loadSettings(),DB.loadServices(),DB.loadGallery()
  ]);
  S.bookings=bookings; S.holidays=holidays; S.settings=settings;
  S.services=services; S.gallery=gallery;
  document.getElementById("loading-screen").style.display="none";
  document.getElementById("app").style.display="block";
  startSync(); render();
}
init();
</script>
